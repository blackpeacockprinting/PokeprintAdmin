<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokePrint Order Tracker</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2d2d44; --primary-light: #3d3d5c; --primary-dark: #1a1a2e;
            --accent: #ffd700; --accent-dark: #e6c200; --text: #ffffff;
            --text-muted: #a0a0b8; --bg: #1a1a2e; --card-bg: #2d2d44; --border: #3d3d5c;
            --success: #4ade80; --warning: #fb923c; --danger: #f87171; --info: #60a5fa;
            --cyan: #22d3ee; --purple: #a78bfa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, var(--bg) 0%, #0f0f1a 100%);
            color: var(--text); min-height: 100vh; padding-bottom: 2rem;
        }
        .header {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            padding: 1.5rem 1rem; text-align: center;
        }
        .header h1 { font-size: 2rem; color: var(--primary-dark); font-weight: 800; letter-spacing: 2px; }
        .header p { color: var(--primary-dark); font-size: 0.9rem; opacity: 0.8; }

        .controls {
            background: var(--primary); padding: 1rem;
            display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center;
            border-bottom: 1px solid var(--border);
        }
        .btn {
            padding: 0.6rem 1rem; border: none; border-radius: 20px;
            background: var(--primary-light); color: var(--text); cursor: pointer;
            font-size: 0.8rem; font-weight: 600; transition: all 0.2s ease;
            display: flex; align-items: center; gap: 0.3rem;
        }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-primary { background: var(--accent); color: var(--primary-dark); }
        .btn-danger { background: var(--danger); color: #fff; }

        .stats-bar {
            background: var(--primary-dark); padding: 1rem;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .content { padding: 1rem; max-width: 600px; margin: 0 auto; }

        .customer-section {
            background: var(--card-bg); border-radius: 16px; margin-bottom: 1rem;
            overflow: hidden; border: 1px solid var(--border);
        }
        .customer-header {
            background: linear-gradient(90deg, var(--primary-light) 0%, var(--primary) 100%);
            padding: 1rem; display: flex; align-items: center; gap: 0.8rem;
            cursor: pointer;
        }
        .customer-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }
        .customer-info { flex: 1; }
        .customer-name { font-size: 1.1rem; font-weight: 700; color: var(--text); }
        .customer-meta { display: flex; gap: 1rem; margin-top: 0.2rem; }
        .meta-item { display: flex; align-items: center; gap: 0.3rem; font-size: 0.75rem; color: var(--text-muted); }

        .orders-container { display: none; }
        .customer-section.expanded .orders-container { display: block; }
        .expand-icon { margin-left: auto; font-size: 1.2rem; transition: transform 0.3s; }
        .customer-section.expanded .expand-icon { transform: rotate(180deg); }

        .order-card {
            background: var(--primary); margin: 0.8rem; border-radius: 12px;
            border: 1px solid var(--border); overflow: hidden;
        }
        .order-header {
            background: var(--primary-light); padding: 0.8rem 1rem;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .order-id { color: var(--purple); font-weight: 700; font-size: 0.9rem; }
        .order-status {
            padding: 0.3rem 0.8rem; border-radius: 12px; font-size: 0.7rem;
            font-weight: 700; text-transform: uppercase;
        }
        .status-pending { background: var(--warning); color: #000; }
        .status-printing { background: var(--info); color: #fff; }
        .status-completed { background: var(--success); color: #000; }
        .delete-btn {
            background: var(--danger); border: none; border-radius: 50%;
            width: 28px; height: 28px; cursor: pointer; font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center;
        }

        .items-container { display: none; padding: 0.8rem; }
        .order-card.expanded .items-container { display: block; }

        .item-card {
            padding: 1rem; border-bottom: 1px solid var(--border); cursor: pointer;
        }
        .item-card:last-child { border-bottom: none; }
        .item-header {
            display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.8rem;
        }
        .pokeball {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(to bottom, #ff0000 50%, #fff 50%);
            border: 3px solid #000; position: relative; flex-shrink: 0;
        }
        .pokeball::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 10px; height: 10px;
            background: #fff; border: 2px solid #000; border-radius: 50%;
        }
        .pokeball.shiny { background: linear-gradient(to bottom, #ffd700 50%, #fff 50%); box-shadow: 0 0 15px #ffd700; }
        .pokeball.completed { background: linear-gradient(to bottom, var(--success) 50%, #fff 50%); }
        .item-info { flex: 1; }
        .item-name { font-size: 1.1rem; font-weight: 700; color: var(--text); }
        .item-price { color: var(--cyan); font-size: 1rem; font-weight: 600; }

        .item-details { display: none; margin-top: 0.8rem; }
        .item-card.expanded .item-details { display: block; }

        .stats-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem;
            margin: 0.8rem 0;
        }
        .stat-box {
            background: var(--card-bg); padding: 0.8rem; border-radius: 8px; text-align: center;
        }
        .stat-box-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; }
        .stat-box-value { font-size: 1.2rem; font-weight: 700; margin-top: 0.2rem; }
        .grams { color: var(--cyan); }
        .cost { color: var(--danger); }
        .revenue { color: var(--cyan); }
        .profit { color: var(--success); }

        .action-buttons {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem;
            margin-top: 0.8rem;
        }
        .action-btn {
            padding: 0.6rem; border: none; border-radius: 10px;
            font-size: 0.75rem; font-weight: 600; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 0.2rem;
            transition: all 0.2s ease;
        }
        .action-btn:hover { transform: scale(1.05); }
        .btn-pending { background: var(--warning); color: #000; }
        .btn-printing { background: var(--info); color: #fff; }
        .btn-complete { background: var(--success); color: #000; }
        .btn-shiny { background: var(--accent); color: var(--primary-dark); }
        .action-btn.active { box-shadow: 0 0 0 2px #fff; }

        .section-header {
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 100%);
            padding: 1rem; margin: 1.5rem 0.8rem 0.8rem 0.8rem; border-radius: 12px;
            border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
        }
        .section-title { font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .section-active { color: var(--accent); }
        .section-completed { color: var(--success); }
        .section-count {
            background: var(--accent); color: var(--primary-dark);
            padding: 0.2rem 0.6rem; border-radius: 10px; font-size: 0.8rem; font-weight: 700;
        }

        .sync-status { text-align: center; padding: 0.5rem; font-size: 0.75rem; color: var(--text-muted); }
        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
        .loading { text-align: center; padding: 3rem; }
        .spinner {
            width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
<base target="_blank">
</head>
<body>
    <header class="header">
        <h1>⚡ POKEPRINT</h1>
        <p>ORDER TRACKER</p>
    </header>

    <div class="controls">
        <button class="btn btn-primary" onclick="syncFromGoogleSheets()">🔄 Sync Sheets</button>
        <button class="btn" onclick="syncN3D()">📥 Sync N3D</button>
        <button class="btn btn-danger" onclick="deleteAllCompleted()">🗑️ Clear Done</button>
    </div>

    <div class="sync-status" id="sync-status">Ready - Click Sync Sheets to load orders</div>

    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-value" id="stat-pending">0</div>
            <div class="stat-label">Pending</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="stat-printing">0</div>
            <div class="stat-label">Printing</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="stat-completed">0</div>
            <div class="stat-label">Done</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="stat-profit">$0</div>
            <div class="stat-label">Profit</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="stat-orders">0</div>
            <div class="stat-label">Orders</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="stat-revenue">$0</div>
            <div class="stat-label">Revenue</div>
        </div>
    </div>

    <div class="content" id="main-content">
        <div class="loading">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
    </div>

    <script>
        // Firebase Config - BlackPeacockPrinting
        const firebaseConfig = {
            apiKey: "AIzaSyBTp9aLB3VaKIKpztrR029mG3mVEw5MNOQ",
            authDomain: "blackpeacockprinting-fbb65.firebaseapp.com",
            projectId: "blackpeacockprinting-fbb65",
            storageBucket: "blackpeacockprinting-fbb65.firebasestorage.app",
            messagingSenderId: "1025287520257",
            appId: "1:1025287520257:web:ff8d4ab1b69fd859c20000"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let orders = [];
        let designs = {};
        const FILAMENT_COST = 0.012; // $12/kg = $0.012/g

        // N3D API v1.2.0 config
        const N3D_API_KEY = 'n3d_sk_SgjHghzsNDmra3wqxB3-ed4nvyZYu6Ja';
        const N3D_BASE_URL = 'https://www.n3dmelbourne.com/api/v1';
        const SHEETS_URL = 'https://docs.google.com/spreadsheets/d/1mfRlr9EaR-XVMEf3W0LaJEEUQ9uS9llLsWTr0jz88ng/export?format=csv';

        // Pricing tiers
        function getPrice(grams) {
            if (grams <= 149) return 8;
            if (grams <= 249) return 10;
            return 12;
        }

        // Fallback designs
        const FALLBACK_DESIGNS = {
            'eevee': { grams: 103.7, filaments: { 'Desert Tan': 17.4, 'Caramel': 67.8, 'Dark Brown': 1.3, 'Charcoal Black': 16.1, 'Ivory White': 1.2 }},
            'vaporeon': { grams: 45, filaments: { 'Blue': 45 } },
            'jolteon': { grams: 42, filaments: { 'Yellow': 42 } },
            'flareon': { grams: 40, filaments: { 'Orange Red': 40 } },
            'espeon': { grams: 38, filaments: { 'Light Purple': 38 } },
            'umbreon': { grams: 40, filaments: { 'Black': 40 } },
            'leafeon': { grams: 42, filaments: { 'Light Green': 42 } },
            'glaceon': { grams: 40, filaments: { 'Cyan': 40 } },
            'sylveon': { grams: 45, filaments: { 'Pink': 45 } },
            'mew': { grams: 35, filaments: { 'Pink': 35 } },
            'mewtwo': { grams: 55, filaments: { 'Light Purple': 55 } },
            'pikachu': { grams: 35, filaments: { 'Yellow': 35 } },
            'bulbasaur': { grams: 42, filaments: { 'Green': 42 } },
            'charmander': { grams: 38, filaments: { 'Orange Red': 38 } },
            'squirtle': { grams: 40, filaments: { 'Blue': 40 } },
            'ivysaur': { grams: 55, filaments: { 'Green': 55 } },
            'venusaur': { grams: 78, filaments: { 'Green': 78 } },
            'charmeleon': { grams: 52, filaments: { 'Orange Red': 52 } },
            'charizard': { grams: 75, filaments: { 'Orange Red': 75 } },
            'wartortle': { grams: 55, filaments: { 'Blue': 55 } },
            'blastoise': { grams: 78, filaments: { 'Blue': 78 } },
            'chandelure': { grams: 58, filaments: { 'Black': 29, 'Purple': 29 } },
            'deoxys': { grams: 52, filaments: { 'Red': 26, 'Orange': 26 } },
            'pinsir': { grams: 55, filaments: { 'Brown': 55 } },
            'metagross': { grams: 75, filaments: { 'Blue': 37.5, 'Silver': 37.5 } },
            'magikarp': { grams: 35, filaments: { 'Red': 17.5, 'White': 17.5 } },
            'sprigatito': { grams: 32, filaments: { 'Green': 16, 'Light Green': 16 }},
            'fuecoco': { grams: 38, filaments: { 'Red': 38 }},
            'quaxly': { grams: 36, filaments: { 'Blue': 36 }}
        };

        document.addEventListener('DOMContentLoaded', loadData);

        async function loadData() {
            try {
                const [ordersSnap, designsDoc] = await Promise.all([
                    db.collection('orders').orderBy('date', 'desc').get(),
                    db.collection('config').doc('designs').get()
                ]);

                orders = ordersSnap.docs.map(d => ({ id: d.id, ...d.data() }));

                if (designsDoc.exists) {
                    const data = designsDoc.data().designs || [];
                    designs = {};
                    data.forEach(d => designs[d.id] = d);
                }

                console.log('Loaded', orders.length, 'orders,', Object.keys(designs).length, 'designs');
                updateStats();
                renderOrders();
            } catch (e) {
                console.error(e);
                document.getElementById('main-content').innerHTML = '<div class="empty-state">Error loading</div>';
            }
        }

        function getDesign(name) {
            const clean = name.toLowerCase().trim().replace(/\s+/g, '-');

            // Try synced designs
            if (designs[clean]) return designs[clean];

            // Try name matching
            for (const [id, design] of Object.entries(designs)) {
                if (design.name && design.name.toLowerCase() === name.toLowerCase()) {
                    return design;
                }
            }

            // Fallback
            const fb = FALLBACK_DESIGNS[clean];
            if (fb) {
                return { 
                    id: clean,
                    name: name,
                    grams: fb.grams, 
                    filamentColors: Object.keys(fb.filaments),
                    price: getPrice(fb.grams)
                };
            }

            // Ultimate fallback
            return { id: clean, name: name, grams: 50, filamentColors: ['Ivory White'], price: 8 };
        }

        function calcItem(item) {
            const design = getDesign(item.name);
            const grams = design.grams * item.qty;
            const cost = grams * FILAMENT_COST;
            const price = (design.price || getPrice(design.grams)) * item.qty;

            return { 
                grams, 
                cost, 
                price, 
                profit: price - cost,
                filamentColors: design.filamentColors || ['Ivory White']
            };
        }

        function renderOrders() {
            const container = document.getElementById('main-content');
            const active = orders.filter(o => o.status !== 'completed');
            const completed = orders.filter(o => o.status === 'completed');

            let html = '';

            const byCustomer = (list) => {
                const g = {};
                list.forEach(o => {
                    if (!g[o.customer]) g[o.customer] = [];
                    g[o.customer].push(o);
                });
                return g;
            };

            if (active.length > 0) {
                html += `<div class="section-header"><span class="section-title section-active">📋 Active Orders</span><span class="section-count">${active.length}</span></div>`;
                const grouped = byCustomer(active);
                for (const [customer, custOrders] of Object.entries(grouped)) {
                    html += renderCustomerSection(customer, custOrders);
                }
            }

            if (completed.length > 0) {
                html += `<div class="section-header"><span class="section-title section-completed">✅ Completed</span><span class="section-count">${completed.length}</span></div>`;
                const grouped = byCustomer(completed);
                for (const [customer, custOrders] of Object.entries(grouped)) {
                    html += renderCustomerSection(customer, custOrders, true);
                }
            }

            if (orders.length === 0) {
                html = '<div class="empty-state">No orders yet<br><small>Click "Sync Sheets" to import from Google Sheets</small></div>';
            }

            container.innerHTML = html;
        }

        function renderCustomerSection(customer, custOrders, isCompleted = false) {
            const pendingCount = custOrders.filter(o => o.status === 'pending').length;
            const printingCount = custOrders.filter(o => o.status === 'printing').length;
            const totalProfit = custOrders.reduce((sum, o) => {
                return sum + o.items.reduce((itemSum, item) => itemSum + calcItem(item).profit, 0);
            }, 0);

            let html = `<div class="customer-section" id="cust-${customer.replace(/\s+/g, '-')}">`;
            html += `
                <div class="customer-header" onclick="toggleCustomer('${customer.replace(/\s+/g, '-')}')">
                    <div class="customer-avatar">👤</div>
                    <div class="customer-info">
                        <div class="customer-name">${customer}</div>
                        <div class="customer-meta">
                            ${pendingCount > 0 ? `<span class="meta-item">⏳ ${pendingCount}</span>` : ''}
                            ${printingCount > 0 ? `<span class="meta-item">🖨️ ${printingCount}</span>` : ''}
                            <span class="meta-item">📦 ${custOrders.length}</span>
                            <span class="meta-item">💰 $${totalProfit.toFixed(0)}</span>
                        </div>
                    </div>
                    <div class="expand-icon">▼</div>
                </div>
                <div class="orders-container">
            `;

            for (const order of custOrders) {
                html += renderOrderCard(order);
            }

            html += '</div></div>';
            return html;
        }

        function renderOrderCard(order) {
            const orderNum = order.sheetsTimestamp ? 
                '#ORD-' + new Date(order.sheetsTimestamp).toISOString().slice(0,10).replace(/-/g,'') : 
                '#' + order.id.substr(0,8).toUpperCase();

            const totalProfit = order.items.reduce((sum, item) => sum + calcItem(item).profit, 0);
            const completedItems = order.items.filter(i => i.status === 'completed').length;

            let itemsHtml = '';
            for (const item of order.items || []) {
                const calc = calcItem(item);
                const itemIdx = order.items.indexOf(item);

                itemsHtml += `
                    <div class="item-card" id="item-${order.id}-${itemIdx}" onclick="toggleItem('${order.id}', ${itemIdx})">
                        <div class="item-header">
                            <div class="pokeball ${item.shiny ? 'shiny' : ''} ${item.status === 'completed' ? 'completed' : ''}"></div>
                            <div class="item-info">
                                <div class="item-name">${item.name} ${item.qty > 1 ? 'x' + item.qty : ''}</div>
                                <div class="item-price">$${calc.price.toFixed(2)}</div>
                            </div>
                        </div>
                        <div class="item-details">
                            <div class="stats-grid">
                                <div class="stat-box">
                                    <div class="stat-box-label">Grams</div>
                                    <div class="stat-box-value grams">${calc.grams.toFixed(1)}g</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-box-label">Cost</div>
                                    <div class="stat-box-value cost">$${calc.cost.toFixed(2)}</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-box-label">Price</div>
                                    <div class="stat-box-value revenue">$${calc.price.toFixed(2)}</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-box-label">Profit</div>
                                    <div class="stat-box-value profit">$${calc.profit.toFixed(2)}</div>
                                </div>
                            </div>
                            <div style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.5rem;">
                                Colors: ${calc.filamentColors.join(', ')}
                            </div>
                            <div class="action-buttons">
                                <button class="action-btn btn-pending ${item.status === 'pending' ? 'active' : ''}" onclick="event.stopPropagation(); setItemStatus('${order.id}', ${itemIdx}, 'pending')">⏳</button>
                                <button class="action-btn btn-printing ${item.status === 'printing' ? 'active' : ''}" onclick="event.stopPropagation(); setItemStatus('${order.id}', ${itemIdx}, 'printing')">🖨️</button>
                                <button class="action-btn btn-complete ${item.status === 'completed' ? 'active' : ''}" onclick="event.stopPropagation(); setItemStatus('${order.id}', ${itemIdx}, 'completed')">✅</button>
                                <button class="action-btn btn-shiny ${item.shiny ? 'active' : ''}" onclick="event.stopPropagation(); toggleShiny('${order.id}', ${itemIdx})">✨</button>
                            </div>
                            ${item.qty > 1 ? `<button class="btn" style="width: 100%; margin-top: 0.5rem;" onclick="event.stopPropagation(); splitItem('${order.id}', ${itemIdx})">Split x${item.qty}</button>` : ''}
                        </div>
                    </div>
                `;
            }

            return `
                <div class="order-card" id="order-${order.id}">
                    <div class="order-header" onclick="toggleOrder('${order.id}')">
                        <div>
                            <span class="order-id">${orderNum}</span>
                            <span style="color: var(--text-muted); font-size: 0.75rem; margin-left: 0.5rem;">$${totalProfit.toFixed(2)} profit • ${completedItems}/${order.items.length} done</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <span class="order-status status-${order.status}">${order.status}</span>
                            <button class="delete-btn" onclick="event.stopPropagation(); deleteOrder('${order.id}')">🗑️</button>
                        </div>
                    </div>
                    <div class="items-container">
                        ${itemsHtml}
                    </div>
                </div>
            `;
        }

        // Toggle functions
        function toggleCustomer(customerId) {
            const el = document.getElementById('cust-' + customerId);
            el.classList.toggle('expanded');
        }

        function toggleOrder(orderId) {
            const el = document.getElementById('order-' + orderId);
            el.classList.toggle('expanded');
        }

        function toggleItem(orderId, itemIdx) {
            const el = document.getElementById('item-' + orderId + '-' + itemIdx);
            el.classList.toggle('expanded');
        }

        // Actions
        async function setItemStatus(orderId, itemIdx, status) {
            const order = orders.find(o => o.id === orderId);
            if (!order || !order.items[itemIdx]) return;

            order.items[itemIdx].status = status;

            // Check if all items complete
            const allComplete = order.items.every(i => i.status === 'completed');
            if (allComplete && order.status !== 'completed') {
                order.status = 'completed';
            }

            await db.collection('orders').doc(orderId).update({ 
                items: order.items,
                status: order.status
            });

            renderOrders();
            updateStats();
        }

        async function toggleShiny(orderId, itemIdx) {
            const order = orders.find(o => o.id === orderId);
            if (!order || !order.items[itemIdx]) return;

            order.items[itemIdx].shiny = !order.items[itemIdx].shiny;
            await db.collection('orders').doc(orderId).update({ items: order.items });
            renderOrders();
        }

        async function splitItem(orderId, itemIdx) {
            const order = orders.find(o => o.id === orderId);
            if (!order || !order.items[itemIdx] || order.items[itemIdx].qty <= 1) return;

            const item = order.items[itemIdx];
            const qty = item.qty;

            // Remove original and add individual items
            order.items.splice(itemIdx, 1);
            for (let i = 0; i < qty; i++) {
                order.items.push({
                    ...item,
                    id: (item.id || item.name) + '-split-' + i,
                    qty: 1,
                    status: item.status,
                    shiny: item.shiny
                });
            }

            await db.collection('orders').doc(orderId).update({ items: order.items });
            renderOrders();
            updateStats();
        }

        async function deleteOrder(orderId) {
            if (!confirm('Delete this order?')) return;

            await db.collection('orders').doc(orderId).delete();
            orders = orders.filter(o => o.id !== orderId);
            renderOrders();
            updateStats();
            document.getElementById('sync-status').textContent = '✅ Order deleted';
        }

        async function deleteAllCompleted() {
            const completed = orders.filter(o => o.status === 'completed');
            if (completed.length === 0) return alert('No completed orders to delete');
            if (!confirm(`Delete ${completed.length} completed orders?`)) return;

            for (const order of completed) {
                await db.collection('orders').doc(order.id).delete();
            }
            orders = orders.filter(o => o.status !== 'completed');
            renderOrders();
            updateStats();
            document.getElementById('sync-status').textContent = `✅ Deleted ${completed.length} orders`;
        }

        function updateStats() {
            let pending = 0, printing = 0, completed = 0, totalProfit = 0, totalRevenue = 0;

            orders.forEach(order => {
                order.items.forEach(item => {
                    const calc = calcItem(item);
                    if (item.status === 'pending') pending += item.qty;
                    else if (item.status === 'printing') printing += item.qty;
                    else if (item.status === 'completed') completed += item.qty;

                    if (order.status === 'completed') {
                        totalProfit += calc.profit;
                        totalRevenue += calc.price;
                    }
                });
            });

            document.getElementById('stat-pending').textContent = pending;
            document.getElementById('stat-printing').textContent = printing;
            document.getElementById('stat-completed').textContent = completed;
            document.getElementById('stat-profit').textContent = '$' + totalProfit.toFixed(0);
            document.getElementById('stat-orders').textContent = orders.length;
            document.getElementById('stat-revenue').textContent = '$' + totalRevenue.toFixed(0);
        }

        // Sync N3D
        async function syncN3D() {
            const status = document.getElementById('sync-status');
            status.textContent = '🔄 Syncing N3D...';

            try {
                const proxies = [
                    'https://corsproxy.io/?url=',
                    'https://api.allorigins.win/raw?url='
                ];

                let allDesigns = [];

                for (const proxy of proxies) {
                    try {
                        let page = 1;
                        while (page <= 5) {
                            const url = proxy + encodeURIComponent(`${N3D_BASE_URL}/designs?page=${page}&limit=200`);
                            const res = await fetch(url, {
                                headers: { 'Authorization': 'Bearer ' + N3D_API_KEY }
                            });

                            if (!res.ok) throw new Error('Failed');

                            const data = await res.json();
                            if (!data.data || !data.data.length) break;

                            data.data.forEach(d => {
                                designs[d.slug] = {
                                    id: d.slug,
                                    name: d.title || d.name,
                                    grams: d.total_weight_grams || d.weight_grams || 50,
                                    filamentColors: d.filament_colors || ['Ivory White'],
                                    price: getPrice(d.total_weight_grams || 50)
                                };
                            });

                            allDesigns.push(...data.data);
                            if (data.data.length < 200) break;
                            page++;
                        }

                        if (allDesigns.length > 0) break;
                    } catch (e) {
                        console.log('Proxy failed, trying next...');
                    }
                }

                // Save to Firebase
                const designsArray = Object.values(designs);
                await db.collection('config').doc('designs').set({ designs: designsArray });

                status.textContent = `✅ Synced ${allDesigns.length} designs from N3D`;
            } catch (e) {
                console.error(e);
                status.textContent = '❌ N3D sync failed, using fallback data';

                // Load fallback
                for (const [name, data] of Object.entries(FALLBACK_DESIGNS)) {
                    designs[name] = {
                        id: name,
                        name: name.charAt(0).toUpperCase() + name.slice(1),
                        grams: data.grams,
                        filamentColors: Object.keys(data.filaments),
                        price: getPrice(data.grams)
                    };
                }
            }

            renderOrders();
        }

        // Sync Google Sheets
        async function syncFromGoogleSheets() {
            const status = document.getElementById('sync-status');
            status.textContent = '🔄 Loading from Google Sheets...';

            try {
                const res = await fetch(SHEETS_URL);
                const csv = await res.text();

                const rows = parseCSV(csv);
                if (rows.length < 2) throw new Error('No data');

                const headers = rows[0];
                const nameIdx = headers.findIndex(h => h.toLowerCase().includes('name'));
                const detailsIdx = headers.findIndex(h => h.toLowerCase().includes('order details'));
                const totalIdx = headers.findIndex(h => h.toLowerCase().includes('order total'));
                const timeIdx = headers.findIndex(h => h.toLowerCase().includes('timestamp'));

                let added = 0;

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    const customer = row[nameIdx];
                    const details = row[detailsIdx];
                    if (!customer || !details) continue;

                    // Check if exists
                    const exists = orders.some(o => 
                        o.customer === customer && o.sheetsTimestamp === row[timeIdx]
                    );

                    if (!exists) {
                        const items = parseItems(details);
                        if (items.length > 0) {
                            await db.collection('orders').add({
                                customer,
                                items,
                                totalPrice: parseFloat(row[totalIdx]) || 0,
                                status: 'pending',
                                date: new Date().toISOString(),
                                source: 'sheets',
                                sheetsTimestamp: row[timeIdx]
                            });
                            added++;
                        }
                    }
                }

                status.textContent = `✅ Added ${added} new orders from Sheets`;
                await loadData();
            } catch (e) {
                console.error(e);
                status.textContent = '❌ Sheets sync failed: ' + e.message;
            }
        }

        function parseCSV(text) {
            const rows = [];
            let row = [], field = '', inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i], next = text[i + 1];
                if (char === '"') {
                    if (inQuotes && next === '"') { field += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                } else if (char === ',' && !inQuotes) {
                    row.push(field.trim()); field = '';
                } else if ((char === '
' || char === '
') && !inQuotes) {
                    if (field || row.length) { row.push(field.trim()); rows.push(row); row = []; field = ''; }
                } else { field += char; }
            }
            if (field || row.length) { row.push(field.trim()); rows.push(row); }
            return rows;
        }

        function parseItems(details) {
            const items = [];
            const lines = details.split(/<br\s*\/?>|
/);

            for (const line of lines) {
                const t = line.trim();
                if (!t) continue;

                let name = t, qty = 1, shiny = false, mystery = false;

                if (t.toLowerCase().startsWith('mystery:')) { 
                    mystery = true; 
                    name = t.replace(/^mystery:\s*/i, ''); 
                }
                if (name.toLowerCase().startsWith('shiny ')) { 
                    shiny = true; 
                    name = name.substring(6); 
                }

                const qm = name.match(/\(x(\d+)\)/i) || name.match(/x(\d+)/i);
                if (qm) qty = parseInt(qm[1]);

                name = name.replace(/\s*[-(].*$/g, '').replace(/\s+x\d+$/i, '').trim();

                if (name) {
                    items.push({ 
                        id: name.toLowerCase().replace(/\s+/g, '-'),
                        name, 
                        qty, 
                        shiny, 
                        mystery, 
                        status: 'pending' 
                    });
                }
            }
            return items;
        }
