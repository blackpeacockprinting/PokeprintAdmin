<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokePrint Order Tracker</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2d2d44; --primary-light: #3d3d5c; --primary-dark: #1a1a2e;
            --accent: #ffd700; --accent-dark: #e6c200; --text: #ffffff;
            --text-muted: #a0a0b8; --bg: #1a1a2e; --card-bg: #2d2d44; --border: #3d3d5c;
            --success: #4ade80; --warning: #fb923c; --danger: #f87171; --info: #60a5fa;
            --cyan: #22d3ee; --purple: #a78bfa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, var(--bg) 0%, #0f0f1a 100%);
            color: var(--text); min-height: 100vh; padding-bottom: 2rem;
        }
        .header {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            padding: 1.5rem 1rem; text-align: center;
        }
        .header h1 { font-size: 2rem; color: var(--primary-dark); font-weight: 800; letter-spacing: 2px; }
        .header p { color: var(--primary-dark); font-size: 0.9rem; opacity: 0.8; }

        .controls {
            background: var(--primary); padding: 1rem;
            display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center;
            border-bottom: 1px solid var(--border);
        }
        .btn {
            padding: 0.6rem 1rem; border: none; border-radius: 20px;
            background: var(--primary-light); color: var(--text); cursor: pointer;
            font-size: 0.8rem; font-weight: 600; transition: all 0.2s ease;
            display: flex; align-items: center; gap: 0.3rem;
        }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-primary { background: var(--accent); color: var(--primary-dark); }

        .stats-bar {
            background: var(--primary-dark); padding: 1rem;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .content { padding: 1rem; max-width: 600px; margin: 0 auto; }

        .customer-section {
            background: var(--card-bg); border-radius: 16px; margin-bottom: 1rem;
            overflow: hidden; border: 1px solid var(--border);
        }
        .customer-header {
            background: linear-gradient(90deg, var(--primary-light) 0%, var(--primary) 100%);
            padding: 1rem; display: flex; align-items: center; gap: 0.8rem;
            cursor: pointer; position: relative; user-select: none;
        }
        .customer-header:hover { opacity: 0.95; }
        .customer-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }
        .customer-info { flex: 1; }
        .customer-name { font-size: 1.1rem; font-weight: 700; color: var(--text); }
        .customer-meta { display: flex; gap: 1rem; margin-top: 0.2rem; }
        .meta-item { display: flex; align-items: center; gap: 0.3rem; font-size: 0.75rem; color: var(--text-muted); }
        .collapse-icon {
            margin-left: auto;
            font-size: 1.2rem;
            color: var(--accent);
            font-weight: bold;
            transition: transform 0.3s ease;
        }

        .order-card {
            background: var(--primary); margin: 0.8rem; border-radius: 12px;
            border: 1px solid var(--border); overflow: hidden;
            transition: all 0.3s ease;
        }
        .order-header {
            background: var(--primary-light); padding: 0.8rem 1rem;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .order-id { color: var(--purple); font-weight: 700; font-size: 0.9rem; }
        .order-status {
            padding: 0.3rem 0.8rem; border-radius: 12px; font-size: 0.7rem;
            font-weight: 700; text-transform: uppercase;
        }
        .status-pending { background: var(--warning); color: #000; }
        .status-printing { background: var(--info); color: #fff; }
        .status-completed { background: var(--success); color: #000; }

        .item-card {
            padding: 1rem; border-bottom: 1px solid var(--border);
        }
        .item-card:last-child { border-bottom: none; }
        .item-header {
            display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.8rem;
            cursor: pointer; position: relative; user-select: none;
        }
        .item-header:hover { opacity: 0.95; }
        .pokeball {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(to bottom, #ff0000 50%, #fff 50%);
            border: 3px solid #000; position: relative; flex-shrink: 0;
        }
        .pokeball::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 10px; height: 10px;
            background: #fff; border: 2px solid #000; border-radius: 50%;
        }
        .pokeball.shiny { background: linear-gradient(to bottom, #ffd700 50%, #fff 50%); box-shadow: 0 0 15px #ffd700; }
        .pokeball.completed { background: linear-gradient(to bottom, var(--success) 50%, #fff 50%); }
        .item-info { flex: 1; }
        .item-name { font-size: 1.1rem; font-weight: 700; color: var(--text); }
        .item-price { color: var(--cyan); font-size: 1rem; font-weight: 600; }

        .filament-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem;
            margin: 0.8rem 0;
            transition: all 0.3s ease;
        }
        .filament-item {
            background: var(--card-bg); padding: 0.5rem; border-radius: 8px;
            display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem;
        }
        .filament-dot {
            width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
        }
        .filament-name { color: var(--text-muted); }
        .filament-grams { color: var(--text); font-weight: 600; margin-left: auto; }

        .stats-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem;
            margin: 0.8rem 0;
            transition: all 0.3s ease;
        }
        .stat-box {
            background: var(--card-bg); padding: 0.8rem; border-radius: 8px; text-align: center;
        }
        .stat-box-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; }
        .stat-box-value { font-size: 1.2rem; font-weight: 700; margin-top: 0.2rem; }
        .grams { color: var(--cyan); }
        .cost { color: var(--danger); }
        .revenue { color: var(--cyan); }
        .profit { color: var(--success); }

        .action-buttons {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem;
            margin-top: 0.8rem;
            transition: all 0.3s ease;
        }
        .action-btn {
            padding: 0.6rem; border: none; border-radius: 10px;
            font-size: 0.75rem; font-weight: 600; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 0.2rem;
            transition: all 0.2s ease;
        }
        .action-btn:hover { transform: scale(1.05); }
        .btn-pending { background: var(--warning); color: #000; }
        .btn-printing { background: var(--info); color: #fff; }
        .btn-complete { background: var(--success); color: #000; }
        .btn-shiny { background: var(--accent); color: var(--primary-dark); }
        .action-btn.active { box-shadow: 0 0 0 2px #fff; }

        .section-header {
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 100%);
            padding: 1rem; margin: 1.5rem 0.8rem 0.8rem 0.8rem; border-radius: 12px;
            border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
        }
        .section-title { font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .section-active { color: var(--accent); }
        .section-completed { color: var(--success); }
        .section-count {
            background: var(--accent); color: var(--primary-dark);
            padding: 0.2rem 0.6rem; border-radius: 10px; font-size: 0.8rem; font-weight: 700;
        }

        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 1rem;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card-bg); border-radius: 16px; width: 100%; max-width: 400px;
            max-height: 90vh; overflow-y: auto; border: 1px solid var(--border);
        }
        .modal-header {
            background: var(--primary); padding: 1rem; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-title { font-size: 1.1rem; font-weight: 700; }
        .modal-close { background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; }
        .modal-body { padding: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.3rem; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 8px;
            background: var(--primary); color: var(--text); font-size: 0.9rem;
        }

        .shopping-item {
            background: var(--primary); padding: 0.8rem; border-radius: 8px;
            display: flex; justify-content: space-between; margin-bottom: 0.5rem;
            border-left: 3px solid var(--danger);
        }

        .sync-status { text-align: center; padding: 0.5rem; font-size: 0.75rem; color: var(--text-muted); }
        .debug-info { 
            background: #0d1117; border: 1px solid var(--border); border-radius: 8px;
            padding: 0.8rem; margin: 0.5rem; font-family: monospace; font-size: 0.7rem;
            color: #7ee787; max-height: 150px; overflow-y: auto; white-space: pre-wrap;
        }
        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
        .loading { text-align: center; padding: 3rem; }
        .spinner {
            width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

<body>
    <header class="header">
        <h1>⚡ POKEPRINT</h1>
        <p>ORDER TRACKER</p>
    </header>

    <div class="controls">
        <button class="btn btn-primary" onclick="syncFromGoogleSheets()">🔄 Sync</button>
        <button class="btn" onclick="openAddOrderModal()">➕ New</button>
        <button class="btn" onclick="openFilamentModal()">🧵 Filament</button>
        <button class="btn" onclick="openShoppingModal()">🛒 Shop</button>
        <button class="btn" onclick="syncN3D()">📥 N3D</button>
    </div>

    <div class="sync-status" id="sync-status">Ready - Click N3D to sync designs</div>
    <div class="debug-info" id="debug-log" style="display: none;"></div>

    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-value" id="stat-pending">0</div>
            <div class="stat-label">Pending</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="stat-printing">0</div>
            <div class="stat-label">Printing</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="stat-completed">0</div>
            <div class="stat-label">Done</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="stat-profit">$0</div>
            <div class="stat-label">Profit</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="stat-filament">0</div>
            <div class="stat-label">Colors</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="stat-low">0</div>
            <div class="stat-label">Low</div>
        </div>
    </div>

    <div class="content" id="main-content">
        <div class="loading">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
    </div>

    <!-- Add Order Modal -->
    <div class="modal" id="add-order-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">New Order</h3>
                <button class="modal-close" onclick="closeModal('add-order-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Customer</label>
                    <input type="text" id="new-customer" placeholder="Name">
                </div>
                <div class="form-group">
                    <label>Items (Name xQty)</label>
                    <textarea id="new-items" placeholder="Pikachu x2&#10;Bulbasaur x1"></textarea>
                </div>
                <button class="btn btn-primary" onclick="addOrder()" style="width: 100%;">Add Order</button>
            </div>
        </div>
    </div>

    <!-- Filament Modal -->
    <div class="modal" id="filament-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Filament</h3>
                <button class="modal-close" onclick="closeModal('filament-modal')">&times;</button>
            </div>
            <div class="modal-body" id="filament-list"></div>
        </div>
    </div>

    <!-- Shopping Modal -->
    <div class="modal" id="shopping-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Shopping List</h3>
                <button class="modal-close" onclick="closeModal('shopping-modal')">&times;</button>
            </div>
            <div class="modal-body" id="shopping-list"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOlEJfO7NFJ2Cde7thfTwX0P8NZ56zTgw",
            authDomain: "pokeprintadmin.firebaseapp.com",
            projectId: "pokeprintadmin",
            storageBucket: "pokeprintadmin.firebasestorage.app",
            messagingSenderId: "610025346733",
            appId: "1:610025346733:web:56dfec4b198739f1e49824"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let orders = [];
        let filament = {};
        let designs = [];
        const FILAMENT_COST = 0.012; // $12/kg

        // Cloud Function URL for N3D sync
        const CLOUD_FUNCTION_URL = 'https://syncn3d-mglznpa3zq-uc.a.run.app';

        // Fallback: Direct N3D API v1.2.0 config
        const N3D_API_KEY = 'n3d_sk_SgjHghzsNDmra3wqxB3-ed4nvyZYu6Ja';
        const N3D_BASE_URL = 'https://www.n3dmelbourne.com/api/v1';
        const SHEETS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk8BdvDMwzoPI2A5X863_8OAXKaSWs5a-aijyX7qMJRWFDoquKJs3gM20wcS-ggas_UuGjU8mCmz1V/pub?output=csv';

        // Your shop pricing tiers
        function getPrice(grams) {
            if (grams <= 149) return 8;
            if (grams <= 249) return 10;
            return 12;
        }

        // Fallback designs with correct N3D-style data
        const FALLBACK_DESIGNS = {
            'eevee': { 
                grams: 103.7, 
                filaments: { 'Desert Tan': 17.4, 'Caramel': 67.8, 'Dark Brown': 1.3, 'Charcoal Black': 16.1, 'Ivory White': 1.2 }
            },
            'vaporeon': { grams: 45, filaments: { 'Blue': 45 } },
            'jolteon': { grams: 42, filaments: { 'Yellow': 42 } },
            'flareon': { grams: 40, filaments: { 'Orange Red': 40 } },
            'espeon': { grams: 38, filaments: { 'Light Purple': 38 } },
            'umbreon': { grams: 40, filaments: { 'Black': 40 } },
            'leafeon': { grams: 42, filaments: { 'Light Green': 42 } },
            'glaceon': { grams: 40, filaments: { 'Cyan': 40 } },
            'sylveon': { grams: 45, filaments: { 'Pink': 45 } },
            'mew': { grams: 35, filaments: { 'Pink': 35 } },
            'mewtwo': { grams: 55, filaments: { 'Light Purple': 55 } },
            'pikachu': { grams: 35, filaments: { 'Yellow': 35 } },
            'bulbasaur': { grams: 42, filaments: { 'Green': 42 } },
            'charmander': { grams: 38, filaments: { 'Orange Red': 38 } },
            'squirtle': { grams: 40, filaments: { 'Blue': 40 } },
            'ivysaur': { grams: 55, filaments: { 'Green': 55 } },
            'venusaur': { grams: 78, filaments: { 'Green': 78 } },
            'charmeleon': { grams: 52, filaments: { 'Orange Red': 52 } },
            'charizard': { grams: 75, filaments: { 'Orange Red': 75 } },
            'wartortle': { grams: 55, filaments: { 'Blue': 55 } },
            'blastoise': { grams: 78, filaments: { 'Blue': 78 } },
            'chandelure': { grams: 58, filaments: { 'Black': 29, 'Purple': 29 } },
            'deoxys': { grams: 52, filaments: { 'Red': 26, 'Orange': 26 } },
            'pinsir': { grams: 55, filaments: { 'Brown': 55 } },
            'metagross': { grams: 75, filaments: { 'Blue': 37.5, 'Silver': 37.5 } },
            'magikarp': { grams: 35, filaments: { 'Red': 17.5, 'White': 17.5 } },
            'sprigatito': { grams: 32, filaments: { 'Green': 16, 'Light Green': 16 }},
            'fuecoco': { grams: 38, filaments: { 'Red': 38 }},
            'quaxly': { grams: 36, filaments: { 'Blue': 36 }}
        };

        const FILAMENT_COLORS = {
            'Desert Tan': '#d4a574', 'Caramel': '#c68e17', 'Dark Brown': '#5d4037',
            'Charcoal Black': '#36454f', 'Ivory White': '#fffff0', 'Yellow': '#ffeb3b',
            'Orange Red': '#ff4500', 'Light Purple': '#da70d6', 'Black': '#212121',
            'Light Green': '#90ee90', 'Cyan': '#00bcd4', 'Pink': '#ffc0cb',
            'Green': '#4caf50', 'Blue': '#2196f3', 'Silver': '#c0c0c0',
            'Brown': '#795548', 'Red': '#f44336', 'Orange': '#ff9800',
            'Purple': '#9c27b0', 'White': '#ffffff', 'Gold': '#ffd700',
            'Grey': '#9e9e9e', 'Teal': '#00897b', 'Cream': '#fffdd0'
        };

        function log(msg) {
            console.log(msg);
            const debug = document.getElementById('debug-log');
            if (debug) {
                debug.style.display = 'block';
                debug.textContent += msg + '\n';
            }
        }

        document.addEventListener('DOMContentLoaded', loadData);

        async function loadData() {
            try {
                const [ordersSnap, filamentDoc, designsDoc] = await Promise.all([
                    db.collection('orders').orderBy('date', 'desc').get(),
                    db.collection('config').doc('filament').get(),
                    db.collection('config').doc('designs').get()
                ]);

                orders = ordersSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                filament = filamentDoc.exists ? filamentDoc.data() : {};
                designs = designsDoc.exists ? designsDoc.data().designs || [] : [];

                log(`Loaded ${orders.length} orders, ${designs.length} designs, ${Object.keys(filament).length} filaments`);

                updateStats();
                renderOrders();
            } catch (e) {
                console.error(e);
                document.getElementById('main-content').innerHTML = '<div class="empty-state">Error loading</div>';
            }
        }

        function getDesign(name) {
            const clean = name.toLowerCase().trim();

            // Try synced designs from N3D
            let d = designs.find(x => x.name.toLowerCase() === clean);
            if (!d) d = designs.find(x => clean.includes(x.name.toLowerCase()));
            if (d) {
                const filaments = {};
                (d.filamentColors || ['Ivory White']).forEach((c, i) => {
                    filaments[c] = (d.grams || 50) / (d.filamentColors?.length || 1);
                });
                return { grams: d.grams || 50, price: getPrice(d.grams || 50), filaments };
            }

            // Fallback
            const fb = FALLBACK_DESIGNS[clean];
            if (fb) {
                return { ...fb, price: getPrice(fb.grams) };
            }

            // Ultimate fallback
            return { grams: 50, price: 8, filaments: { 'Ivory White': 50 }};
        }

        function calcItem(item) {
            const design = getDesign(item.name);
            const grams = design.grams * item.qty;
            const cost = grams * FILAMENT_COST;
            const price = design.price * item.qty;

            // Scale filaments by qty
            const scaledFilaments = {};
            for (const [color, g] of Object.entries(design.filaments)) {
                scaledFilaments[color] = g * item.qty;
            }

            return { 
                grams, 
                cost, 
                price, 
                profit: price - cost,
                filaments: scaledFilaments
            };
        }

        function renderOrders() {
            const container = document.getElementById('main-content');
            const active = orders.filter(o => o.status !== 'completed');
            const completed = orders.filter(o => o.status === 'completed');

            let html = '';

            const byCustomer = (list) => {
                const g = {};
                list.forEach(o => {
                    if (!g[o.customer]) g[o.customer] = [];
                    g[o.customer].push(o);
                });
                return g;
            };

            if (active.length > 0) {
                html += `<div class="section-header"><span class="section-title section-active">📋 Active Orders</span><span class="section-count">${active.length}</span></div>`;
                const grouped = byCustomer(active);
                for (const [customer, custOrders] of Object.entries(grouped)) {
                    html += renderCustomerSection(customer, custOrders);
                }
            }

            if (completed.length > 0) {
                html += `<div class="section-header"><span class="section-title section-completed">✅ Completed</span><span class="section-count">${completed.length}</span></div>`;
                const grouped = byCustomer(completed);
                for (const [customer, custOrders] of Object.entries(grouped)) {
                    html += renderCustomerSection(customer, custOrders, true);
                }
            }

            if (orders.length === 0) {
                html = '<div class="empty-state">No orders yet<br><small>Click Sync to import from Google Sheets</small></div>';
            }

            container.innerHTML = html;

            // Initialize collapse handlers after rendering
            setTimeout(initCollapseHandlers, 100);
        }

        // COLLAPSE/EXPAND FUNCTIONALITY
        function initCollapseHandlers() {
            // Customer section collapse
            document.querySelectorAll('.customer-header').forEach(header => {
                // Remove existing listeners to prevent duplicates
                header.removeEventListener('click', handleCustomerClick);
                header.addEventListener('click', handleCustomerClick);
            });

            // Item collapse
            document.querySelectorAll('.item-header').forEach(header => {
                header.removeEventListener('click', handleItemClick);
                header.addEventListener('click', handleItemClick);
            });
        }

        function handleCustomerClick(e) {
            // Don't collapse if clicking on action buttons
            if (e.target.closest('button')) return;

            const header = e.currentTarget;
            const section = header.closest('.customer-section');
            const orders = section.querySelectorAll('.order-card');
            const isCollapsed = header.dataset.collapsed === 'true';

            orders.forEach(order => {
                order.style.display = isCollapsed ? 'block' : 'none';
            });

            header.dataset.collapsed = !isCollapsed;
            updateToggleIcon(header, !isCollapsed);
        }

        function handleItemClick(e) {
            // Don't collapse if clicking on action buttons
            if (e.target.closest('button')) return;

            const header = e.currentTarget;
            const card = header.closest('.item-card');
            const details = card.querySelectorAll('.filament-grid, .stats-grid, .action-buttons');
            const isCollapsed = header.dataset.collapsed === 'true';

            details.forEach(el => {
                el.style.display = isCollapsed ? 'grid' : 'none';
            });

            header.dataset.collapsed = !isCollapsed;
            updateToggleIcon(header, !isCollapsed);
        }

        function updateToggleIcon(element, collapsed) {
            let icon = element.querySelector('.collapse-icon');
            if (!icon) {
                icon = document.createElement('span');
                icon.className = 'collapse-icon';
                element.appendChild(icon);
            }
            icon.textContent = collapsed ? '▶' : '▼';
            icon.style.transform = collapsed ? 'rotate(-90deg)' : 'rotate(0deg)';
        }

        function renderCustomerSection(customer, custOrders, isCompleted = false) {
            const pendingCount = custOrders.filter(o => o.status === 'pending').length;
            const printingCount = custOrders.filter(o => o.status === 'printing').length;

            let html = `<div class="customer-section">`;
            html += `
                <div class="customer-header" data-collapsed="false">
                    <div class="customer-avatar">👤</div>
                    <div class="customer-info">
                        <div class="customer-name">${customer}</div>
                        <div class="customer-meta">
                            ${pendingCount > 0 ? `<span class="meta-item">⏳ ${pendingCount}</span>` : ''}
                            ${printingCount > 0 ? `<span class="meta-item">🖨️ ${printingCount}</span>` : ''}
                            <span class="meta-item">📦 ${custOrders.length}</span>
                        </div>
                    </div>
                    <span class="collapse-icon">▼</span>
                </div>
            `;

            for (const order of custOrders) {
                html += renderOrderCard(order);
            }

            html += '</div>';
            return html;
        }

        function renderOrderCard(order) {
            const orderNum = order.sheetsTimestamp ? 
                '#ORD-' + new Date(order.sheetsTimestamp).toISOString().slice(0,10).replace(/-/g,'') : 
                '#' + order.id.substr(0,8).toUpperCase();

            let itemsHtml = '';

            for (const item of order.items || []) {
                const calc = calcItem(item);

                // Build filament breakdown
                let filHtml = '';
                for (const [color, grams] of Object.entries(calc.filaments)) {
                    const colorCode = FILAMENT_COLORS[color] || '#888';
                    filHtml += `
                        <div class="filament-item">
                            <div class="filament-dot" style="background: ${colorCode}"></div>
                            <span class="filament-name">${color}:</span>
                            <span class="filament-grams">${grams.toFixed(1)}g</span>
                        </div>
                    `;
                }

                itemsHtml += `
                    <div class="item-card">
                        <div class="item-header" data-collapsed="false">
                            <div class="pokeball ${item.shiny ? 'shiny' : ''} ${item.completed ? 'completed' : ''}"></div>
                            <div class="item-info">
                                <div class="item-name">${item.name}</div>
                                <div class="item-price">$${calc.price.toFixed(2)}</div>
                            </div>
                            <span class="collapse-icon">▼</span>
                        </div>
                        <div class="filament-grid">${filHtml}</div>
                        <div class="stats-grid">
                            <div class="stat-box">
                                <div class="stat-box-label">Grams</div>
                                <div class="stat-box-value grams">${calc.grams.toFixed(1)}g</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-box-label">Cost</div>
                                <div class="stat-box-value cost">$${calc.cost.toFixed(2)}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-box-label">Revenue</div>
                                <div class="stat-box-value revenue">$${calc.price.toFixed(2)}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-box-label">Profit</div>
                                <div class="stat-box-value profit">$${calc.profit.toFixed(2)}</div>
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button class="action-btn btn-pending ${order.status === 'pending' ? 'active' : ''}" onclick="setStatus('${order.id}', 'pending')">⏳ Pending</button>
                            <button class="action-btn btn-printing ${order.status === 'printing' ? 'active' : ''}" onclick="setStatus('${order.id}', 'printing')">🖨️ Printing</button>
                            <button class="action-btn btn-complete ${order.status === 'completed' ? 'active' : ''}" onclick="setStatus('${order.id}', 'completed')">✅ Complete</button>
                            <button class="action-btn btn-shiny ${item.shiny ? 'active' : ''}" onclick="toggleShiny('${order.id}', ${order.items.indexOf(item)})">✨ Shiny</button>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="order-card">
                    <div class="order-header">
                        <span class="order-id">${orderNum}</span>
                        <span class="order-status status-${order.status}">${order.status}</span>
                    </div>
                    ${itemsHtml}
                </div>
            `;
        }

        async function setStatus(orderId, status) {
            const order = orders.find(o => o.id === orderId);
            if (!order) return;

            const oldStatus = order.status;
            order.status = status;
            await db.collection('orders').doc(orderId).update({ status });

            if (status === 'completed' && oldStatus !== 'completed') {
                for (const item of order.items) {
                    const calc = calcItem(item);
                    for (const [color, grams] of Object.entries(calc.filaments)) {
                        if (!filament[color]) filament[color] = { amount: 1000 };
                        filament[color].amount = Math.max(0, filament[color].amount - grams);
                    }
                }
                await db.collection('config').doc('filament').set(filament);
            }

            updateStats();
            renderOrders();
        }

        async function toggleShiny(orderId, itemIdx) {
            const order = orders.find(o => o.id === orderId);
            if (!order || !order.items[itemIdx]) return;
            order.items[itemIdx].shiny = !order.items[itemIdx].shiny;
            await db.collection('orders').doc(orderId).update({ items: order.items });
            renderOrders();
        }

        function updateStats() {
            const pending = orders.filter(o => o.status === 'pending').length;
            const printing = orders.filter(o => o.status === 'printing').length;
            const completed = orders.filter(o => o.status === 'completed').length;
            const colors = Object.keys(filament).length;
            const low = Object.values(filament).filter(f => (f.amount || 0) <= 200).length;

            let profit = 0;
            for (const o of orders) {
                if (o.status === 'completed') {
                    for (const item of o.items) {
                        profit += calcItem(item).profit;
                    }
                }
            }

            document.getElementById('stat-pending').textContent = pending;
            document.getElementById('stat-printing').textContent = printing;
            document.getElementById('stat-completed').textContent = completed;
            document.getElementById('stat-profit').textContent = '$' + profit.toFixed(0);
            document.getElementById('stat-filament').textContent = colors;
            document.getElementById('stat-low').textContent = low;
        }

        // CLOUD FUNCTION N3D SYNC (Primary method)
        async function syncN3D() {
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '⏳';

            const statusEl = document.getElementById('sync-status');
            statusEl.textContent = '🔄 Syncing via Cloud Function...';
            log('Starting N3D sync via Cloud Function...');

            try {
                // Call the Cloud Function
                const response = await fetch(CLOUD_FUNCTION_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({})
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const result = await response.json();
                log(`Cloud Function result: ${JSON.stringify(result)}`);

                if (result.success) {
                    // Reload data from Firestore (Cloud Function saves it there)
                    await loadData();

                    statusEl.textContent = `✅ Synced ${result.count} designs via Cloud Function!`;
                    alert(`Successfully synced ${result.count} designs from N3D!\n\nExamples:\n- ${designs[0]?.name} (${designs[0]?.grams}g)\n- ${designs[1]?.name} (${designs[1]?.grams}g)`);
                } else {
                    throw new Error(result.message || 'Unknown error');
                }

            } catch (error) {
                log(`Cloud Function failed: ${error.message}`);
                statusEl.textContent = '❌ Cloud Function failed, trying fallback...';

                // Fall back to direct API
                await syncN3DDirect();
            } finally {
                btn.textContent = originalText;
            }
        }

        // DIRECT N3D SYNC (Fallback method)
        async function syncN3DDirect() {
            const statusEl = document.getElementById('sync-status');
            log('Starting direct N3D sync (fallback)...');

            try {
                // Try multiple CORS proxies
                const proxies = [
                    { url: 'https://corsproxy.io/?url=', name: 'corsproxy.io' },
                    { url: 'https://api.allorigins.win/raw?url=', name: 'allorigins' },
                    { url: 'https://api.codetabs.com/v1/proxy?quest=', name: 'codetabs' }
                ];

                let allDesigns = [];
                let lastError = null;

                for (const proxy of proxies) {
                    try {
                        log(`Trying ${proxy.name}...`);
                        allDesigns = [];
                        let page = 1;
                        let hasMore = true;

                        while (hasMore && page <= 5) {
                            const apiUrl = `${N3D_BASE_URL}/designs?page=${page}&limit=200`;
                            const fullUrl = proxy.url + encodeURIComponent(apiUrl);

                            log(`Fetching page ${page}...`);

                            const response = await fetch(fullUrl, {
                                method: 'GET',
                                headers: {
                                    'Authorization': `Bearer ${N3D_API_KEY}`,
                                    'Accept': 'application/json'
                                }
                            });

                            if (!response.ok) {
                                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                            }

                            const data = await response.json();
                            log(`Page ${page}: ${data.data?.length || 0} designs`);

                            const pageDesigns = data.data || [];

                            if (pageDesigns.length === 0) {
                                hasMore = false;
                            } else {
                                // Map N3D v1.2.0 format
                                const mapped = pageDesigns.map(d => ({
                                    id: d.slug || d.id,
                                    name: d.title || d.name,
                                    pokedexNumber: d.pokedex_number,
                                    grams: d.total_weight_grams || d.weight_grams || d.weight || 50,
                                    filamentColors: d.filament_colors || d.filaments || ['Ivory White'],
                                    category: d.category || 'Pokemon',
                                    entitled: d.entitled || false,
                                    lastSynced: new Date().toISOString()
                                }));

                                allDesigns.push(...mapped);
                                page++;
                            }
                        }

                        if (allDesigns.length > 0) {
                            log(`✅ Success with ${proxy.name}: ${allDesigns.length} designs`);
                            break;
                        }
                    } catch (e) {
                        log(`❌ ${proxy.name} failed: ${e.message}`);
                        lastError = e;
                        continue;
                    }
                }

                if (allDesigns.length === 0) {
                    throw new Error(`All proxies failed. Last error: ${lastError?.message}`);
                }

                // Save to Firestore
                designs = allDesigns;
                await db.collection('config').doc('designs').set({ designs });
                log(`✅ Saved ${designs.length} designs to Firebase`);

                // Initialize filament inventory from designs
                const colorSet = new Set();
                designs.forEach(d => {
                    if (d.filamentColors) {
                        d.filamentColors.forEach(c => colorSet.add(c));
                    }
                });

                colorSet.forEach(color => {
                    if (!filament[color]) filament[color] = { amount: 1000 };
                });

                await db.collection('config').doc('filament').set(filament);
                log(`✅ Initialized ${colorSet.size} filament colors`);

                statusEl.textContent = `✅ Synced ${designs.length} designs (fallback)`;
                updateStats();
                renderOrders();

                alert(`Synced ${designs.length} designs via fallback.\n\nExamples:\n- ${designs[0]?.name} (${designs[0]?.grams}g)\n- ${designs[1]?.name} (${designs[1]?.grams}g)`);

            } catch (error) {
                log(`❌ Direct sync failed: ${error.message}`);
                statusEl.textContent = '❌ N3D failed - using fallback data';

                // Use fallback designs
                designs = Object.entries(FALLBACK_DESIGNS).map(([name, data]) => ({
                    id: name,
                    name: name.charAt(0).toUpperCase() + name.slice(1),
                    grams: data.grams,
                    filamentColors: Object.keys(data.filaments),
                    pokedexNumber: null,
                    category: 'Pokemon',
                    lastSynced: new Date().toISOString()
                }));

                await db.collection('config').doc('designs').set({ designs });

                // Init filament from fallback
                const fbColors = new Set();
                Object.values(FALLBACK_DESIGNS).forEach(d => {
                    Object.keys(d.filaments).forEach(c => fbColors.add(c));
                });
                fbColors.forEach(c => {
                    if (!filament[c]) filament[c] = { amount: 1000 };
                });
                await db.collection('config').doc('filament').set(filament);

                updateStats();
                renderOrders();

                alert(`N3D sync failed, but loaded ${designs.length} fallback designs.\n\nError: ${error.message}\n\nYou can still use the app!`);
            }
        }

        async function syncFromGoogleSheets() {
            const status = document.getElementById('sync-status');
            status.textContent = '🔄 Syncing from Google Sheets...';

            try {
                const res = await fetch(SHEETS_URL);
                const csv = await res.text();

                const rows = parseCSV(csv);
                if (rows.length < 2) throw new Error('No data');

                const headers = rows[0];
                const nameIdx = headers.findIndex(h => h.toLowerCase().includes('name'));
                const detailsIdx = headers.findIndex(h => h.toLowerCase().includes('order details'));
                const shinyIdx = headers.findIndex(h => h.toLowerCase().includes('shiny'));
                const totalIdx = headers.findIndex(h => h.toLowerCase().includes('order total'));
                const timeIdx = headers.findIndex(h => h.toLowerCase().includes('timestamp'));

                let added = 0;

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    const customer = row[nameIdx];
                    const details = row[detailsIdx];
                    if (!customer || !details) continue;

                    const items = parseItems(details, row[shinyIdx]);
                    if (items.length === 0) continue;

                    const exists = orders.some(o => 
                        o.customer === customer && o.sheetsTimestamp === row[timeIdx]
                    );

                    if (!exists) {
                        await db.collection('orders').add({
                            customer,
                            items,
                            totalPrice: parseFloat(row[totalIdx]) || 0,
                            status: 'pending',
                            date: new Date().toISOString(),
                            source: 'sheets',
                            sheetsTimestamp: row[timeIdx]
                        });
                        added++;
                    }
                }

                status.textContent = `✅ Added ${added} orders from Sheets`;
                await loadData();
            } catch (e) {
                status.textContent = '❌ Sheets sync failed';
                console.error(e);
            }
        }

        function parseCSV(text) {
            const rows = [];
            let row = [], field = '', inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i], next = text[i + 1];
                if (char === '"') {
                    if (inQuotes && next === '"') { field += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                } else if (char === ',' && !inQuotes) {
                    row.push(field.trim()); field = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (field || row.length) { row.push(field.trim()); rows.push(row); row = []; field = ''; }
                } else { field += char; }
            }
            if (field || row.length) { row.push(field.trim()); rows.push(row); }
            return rows;
        }

        function parseItems(details, shinyReq) {
            const items = [];
            const lines = details.split(/<br\s*\/?>|\n/);

            for (const line of lines) {
                const t = line.trim();
                if (!t) continue;

                let name = t, qty = 1, shiny = false, mystery = false;

                if (t.toLowerCase().startsWith('mystery:')) { mystery = true; name = t.replace(/^mystery:\s*/i, ''); }
                if (name.toLowerCase().startsWith('shiny ')) { shiny = true; name = name.substring(6); }

                const qm = name.match(/\(x(\d+)\)/i) || name.match(/\bx(\d+)\b/i);
                if (qm) qty = parseInt(qm[1]);

                name = name.replace(/\s*[-(].*$/g, '').replace(/\s+x\d+$/i, '').trim();

                if (shinyReq && shinyReq.toLowerCase().includes(name.toLowerCase())) shiny = true;

                if (name) items.push({ name, qty, shiny, mystery, completed: false });
            }
            return items;
        }

        async function addOrder() {
            const customer = document.getElementById('new-customer').value.trim();
            const itemsText = document.getElementById('new-items').value.trim();
            if (!customer || !itemsText) return alert('Fill all fields');

            const items = itemsText.split('\n').map(line => {
                const m = line.match(/(.+?)\s*x\s*(\d+)/i);
                return m ? { name: m[1].trim(), qty: parseInt(m[2]), shiny: false, mystery: false, completed: false } : null;
            }).filter(Boolean);

            if (items.length === 0) return alert('Invalid items');

            await db.collection('orders').add({
                customer, items, totalPrice: 0, status: 'pending',
                date: new Date().toISOString(), source: 'manual'
            });

            closeModal('add-order-modal');
            document.getElementById('new-customer').value = '';
            document.getElementById('new-items').value = '';
            await loadData();
        }

        function openFilamentModal() {
            const list = document.getElementById('filament-list');
            let html = '';
            Object.entries(filament).sort((a,b) => b[1].amount - a[1].amount).forEach(([color, data]) => {
                const low = data.amount <= 200;
                html += `<div class="shopping-item" style="border-color: ${low ? 'var(--danger)' : 'var(--success)'}"><span>${color}</span><span style="color: ${low ? 'var(--danger)' : 'var(--success)'}">${data.amount}g</span></div>`;
            });
            list.innerHTML = html || '<p style="color: var(--text-muted)">No filament data. Click N3D Sync first.</p>';
            openModal('filament-modal');
        }

        function openShoppingModal() {
            const list = document.getElementById('shopping-list');
            const low = Object.entries(filament).filter(([c,d]) => d.amount <= 200);
            let html = low.length ? '' : '<p style="color: var(--text-muted)">✅ All stocked!</p>';
            low.forEach(([color, data]) => {
                html += `<div class="shopping-item"><span>${color}</span><span style="color: var(--danger)">${data.amount}g left</span></div>`;
            });
            list.innerHTML = html;
            openModal('shopping-modal');
        }

        function openAddOrderModal() { openModal('add-order-modal'); }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        document.querySelectorAll('.modal').forEach(m => m.addEventListener('click', e => { if (e.target === m) closeModal(m.id); }));
    </script>
