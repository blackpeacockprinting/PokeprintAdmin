<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filament Inventory - PokePrint</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --poke-red: #DC2626;
            --poke-red-dark: #B91C1C;
            --poke-black: #0F0F0F;
            --poke-dark: #1A1A1A;
            --poke-gray: #262626;
            --poke-light: #404040;
            --text-primary: #FFFFFF;
            --text-secondary: #A3A3A3;
            --status-ok: #22C55E;
            --status-warning: #F59E0B;
            --status-critical: #EF4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--poke-black);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(180deg, var(--poke-dark) 0%, var(--poke-black) 100%);
            border-bottom: 3px solid var(--poke-red);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(180deg, var(--poke-red) 50%, white 50%);
            border-radius: 50%;
            border: 3px solid var(--poke-black);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 3px;
            background: var(--poke-black);
            top: 50%;
            transform: translateY(-50%);
        }

        .logo-icon::after {
            content: '';
            width: 14px;
            height: 14px;
            background: white;
            border: 2px solid var(--poke-black);
            border-radius: 50%;
            position: relative;
            z-index: 1;
        }

        .logo-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .logo-text span {
            color: var(--poke-red);
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
            padding: 0.625rem 1rem;
            background: var(--poke-gray);
            border-radius: 10px;
            border: 1px solid transparent;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--text-primary);
            background: var(--poke-light);
            border-color: var(--poke-red);
        }

        .nav-link svg {
            width: 18px;
            height: 18px;
        }

        /* Main Content */
        .main-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem;
            font-weight: 700;
        }

        .page-actions {
            display: flex;
            gap: 0.75rem;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: var(--poke-red);
            color: white;
        }

        .btn-primary:hover {
            background: var(--poke-red-dark);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--poke-gray);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--poke-light);
        }

        .btn svg {
            width: 18px;
            height: 18px;
        }

        /* Alert Banner */
        .alert-banner {
            background: linear-gradient(90deg, rgba(239, 68, 68, 0.2), rgba(239, 68, 68, 0.1));
            border: 1px solid var(--poke-red);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .alert-icon {
            width: 40px;
            height: 40px;
            background: rgba(239, 68, 68, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--poke-red);
        }

        .alert-icon svg {
            width: 24px;
            height: 24px;
        }

        .alert-content {
            flex: 1;
        }

        .alert-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .alert-text {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--poke-dark);
            border-radius: 16px;
            padding: 1.25rem;
            border: 1px solid var(--poke-gray);
        }

        .stat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .stat-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon.ok { background: rgba(34, 197, 94, 0.2); color: var(--status-ok); }
        .stat-icon.warning { background: rgba(245, 158, 11, 0.2); color: var(--status-warning); }
        .stat-icon.critical { background: rgba(239, 68, 68, 0.2); color: var(--status-critical); }

        .stat-icon svg {
            width: 18px;
            height: 18px;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
        }

        /* Inventory Grid */
        .inventory-section {
            margin-bottom: 2rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .section-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title svg {
            width: 20px;
            height: 20px;
            color: var(--poke-red);
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .filament-card {
            background: var(--poke-dark);
            border-radius: 16px;
            border: 1px solid var(--poke-gray);
            padding: 1.25rem;
            transition: all 0.2s;
        }

        .filament-card:hover {
            border-color: var(--poke-light);
        }

        .filament-card.critical {
            border-color: var(--status-critical);
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), var(--poke-dark));
        }

        .filament-card.warning {
            border-color: var(--status-warning);
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), var(--poke-dark));
        }

        .filament-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .filament-color {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .color-swatch {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 2px solid var(--poke-light);
        }

        .filament-name {
            font-weight: 600;
        }

        .filament-type {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .filament-status {
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.625rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .filament-status.ok { background: rgba(34, 197, 94, 0.2); color: var(--status-ok); }
        .filament-status.warning { background: rgba(245, 158, 11, 0.2); color: var(--status-warning); }
        .filament-status.critical { background: rgba(239, 68, 68, 0.2); color: var(--status-critical); }

        .filament-stock {
            margin-bottom: 1rem;
        }

        .stock-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .stock-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .stock-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .stock-bar {
            height: 8px;
            background: var(--poke-gray);
            border-radius: 4px;
            overflow: hidden;
        }

        .stock-fill {
            height: 100%;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .stock-fill.ok { background: var(--status-ok); }
        .stock-fill.warning { background: var(--status-warning); }
        .stock-fill.critical { background: var(--status-critical); }

        .filament-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            padding-top: 1rem;
            border-top: 1px solid var(--poke-gray);
        }

        .detail-item {
            text-align: center;
        }

        .detail-label {
            font-size: 0.625rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        .detail-value {
            font-size: 0.875rem;
            font-weight: 600;
        }

        .filament-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .filament-actions .btn {
            flex: 1;
            justify-content: center;
            padding: 0.5rem;
            font-size: 0.75rem;
        }

        /* Reorder List */
        .reorder-list {
            background: var(--poke-dark);
            border-radius: 16px;
            border: 1px solid var(--poke-gray);
            padding: 1.25rem;
        }

        .reorder-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--poke-gray);
        }

        .reorder-item:last-child {
            border-bottom: none;
        }

        .reorder-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .reorder-color {
            width: 24px;
            height: 24px;
            border-radius: 6px;
        }

        .reorder-name {
            font-weight: 600;
        }

        .reorder-deficit {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .reorder-qty {
            font-weight: 700;
            color: var(--poke-red);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--poke-dark);
            border-radius: 20px;
            padding: 2rem;
            max-width: 450px;
            width: 90%;
            border: 2px solid var(--poke-gray);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-close svg {
            width: 24px;
            height: 24px;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--poke-gray);
            border: 2px solid var(--poke-light);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.9375rem;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--poke-red);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .modal-btn {
            flex: 1;
            padding: 0.875rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }

        .modal-btn.primary {
            background: var(--poke-red);
            color: white;
        }

        .modal-btn.secondary {
            background: var(--poke-gray);
            color: var(--text-primary);
        }

        /* Loading */
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--poke-gray);
            border-top-color: var(--poke-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem;
            background: var(--poke-dark);
            border-radius: 16px;
            border: 1px solid var(--poke-gray);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">
                <div class="logo-icon"></div>
                <div class="logo-text">Filament<span>Inventory</span></div>
            </a>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                    </svg>
                    Shop
                </a>
                <a href="designs.html" class="nav-link">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    Designs
                </a>
                <a href="inventory.html" class="nav-link active">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                    </svg>
                    Inventory
                </a>
                <a href="track-order-v2.html" class="nav-link">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                    </svg>
                    Orders
                </a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <div class="page-header">
            <h1 class="page-title">Filament Inventory</h1>
            <div class="page-actions">
                <button class="btn btn-secondary" id="syncFilamentsBtn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                    Sync N3D
                </button>
                <button class="btn btn-primary" id="addFilamentBtn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                    </svg>
                    Add Filament
                </button>
            </div>
        </div>

        <!-- Alerts Container -->
        <div id="alertsContainer"></div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-header">
                    <span class="stat-label">Total Colors</span>
                    <div class="stat-icon ok">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"></path>
                        </svg>
                    </div>
                </div>
                <div class="stat-value" id="totalColors">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <span class="stat-label">In Stock</span>
                    <div class="stat-icon ok">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                        </svg>
                    </div>
                </div>
                <div class="stat-value" id="inStock">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <span class="stat-label">Low Stock</span>
                    <div class="stat-icon warning">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                        </svg>
                    </div>
                </div>
                <div class="stat-value" id="lowStock">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <span class="stat-label">Critical</span>
                    <div class="stat-icon critical">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                </div>
                <div class="stat-value" id="criticalStock">0</div>
            </div>
        </div>

        <!-- Inventory Grid -->
        <div class="inventory-section">
            <div class="section-header">
                <h2 class="section-title">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                    </svg>
                    Current Stock
                </h2>
            </div>
            <div class="inventory-grid" id="inventoryGrid">
                <div class="loading-spinner"></div>
            </div>
        </div>

        <!-- Reorder List -->
        <div class="inventory-section">
            <div class="section-header">
                <h2 class="section-title">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path>
                    </svg>
                    Reorder List
                </h2>
            </div>
            <div class="reorder-list" id="reorderList">
                <div class="empty-state" style="padding: 2rem;">
                    <p style="color: var(--text-secondary);">All filaments are well stocked!</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Add/Edit Filament Modal -->
    <div class="modal-overlay" id="filamentModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Add Filament</h3>
                <button class="modal-close" id="closeModal">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <form id="filamentForm">
                <input type="hidden" id="filamentId">
                <div class="form-group">
                    <label class="form-label">Color Name</label>
                    <input type="text" class="form-input" id="filamentColor" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Filament Type</label>
                    <select class="form-input" id="filamentType">
                        <option value="PLA">PLA</option>
                        <option value="PETG">PETG</option>
                        <option value="ABS">ABS</option>
                        <option value="TPU">TPU</option>
                        <option value="Silk">Silk</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Current Stock (grams)</label>
                    <input type="number" class="form-input" id="filamentStock" value="0" min="0" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Reorder Point (grams)</label>
                    <input type="number" class="form-input" id="reorderPoint" value="100" min="1" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Cost per Gram ($)</label>
                    <input type="number" class="form-input" id="costPerGram" value="0.013" min="0.001" step="0.001" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="modal-btn secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="modal-btn primary">Save Filament</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Adjust Stock Modal -->
    <div class="modal-overlay" id="adjustModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Adjust Stock</h3>
                <button class="modal-close" id="closeAdjustModal">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <form id="adjustForm">
                <input type="hidden" id="adjustFilamentId">
                <div class="form-group">
                    <label class="form-label">Current Stock</label>
                    <input type="text" class="form-input" id="currentStockDisplay" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label">Adjustment (+ to add, - to subtract)</label>
                    <input type="number" class="form-input" id="adjustAmount" value="0" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="modal-btn secondary" id="cancelAdjustBtn">Cancel</button>
                    <button type="submit" class="modal-btn primary">Update Stock</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { 
            getFirestore, 
            collection, 
            query, 
            onSnapshot, 
            doc, 
            setDoc,
            updateDoc,
            deleteDoc,
            serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBTp9aLB3VaKIKpztrR029mG3mVEw5MNOQ",
            authDomain: "blackpeacockprinting-fbb65.firebaseapp.com",
            projectId: "blackpeacockprinting-fbb65",
            storageBucket: "blackpeacockprinting-fbb65.firebasestorage.app",
            messagingSenderId: "1025287520257",
            appId: "1:1025287520257:web:ff8d4ab1b69fd859c20000"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // State
        let filaments = [];
        let editingFilamentId = null;
        let adjustingFilamentId = null;

        // DOM Elements
        const inventoryGrid = document.getElementById('inventoryGrid');
        const reorderList = document.getElementById('reorderList');
        const alertsContainer = document.getElementById('alertsContainer');
        const filamentModal = document.getElementById('filamentModal');
        const adjustModal = document.getElementById('adjustModal');

        // Color map for swatches
        const colorMap = {
            'Red': '#EF4444',
            'Blue': '#3B82F6',
            'Green': '#22C55E',
            'Yellow': '#EAB308',
            'Orange': '#F97316',
            'Purple': '#A855F7',
            'Pink': '#EC4899',
            'Black': '#1F2937',
            'White': '#F9FAFB',
            'Ivory': '#FEF3C7',
            'Gray': '#6B7280',
            'Silver': '#C0C0C0',
            'Gold': '#FFD700',
            'Brown': '#92400E',
            'Cyan': '#06B6D4',
            'Magenta': '#D946EF'
        };

        // Listen to filaments
        const filamentsQuery = query(collection(db, 'pokeprint', 'filaments', 'inventory'));
        onSnapshot(filamentsQuery, (snapshot) => {
            filaments = [];
            snapshot.forEach((doc) => {
                filaments.push({ id: doc.id, ...doc.data() });
            });
            renderInventory();
            updateStats();
            checkLowStock();
        });

        // Get status based on stock level
        function getStatus(filament) {
            const stock = filament.currentStock || 0;
            const reorderPoint = filament.reorderPoint || 100;
            
            if (stock <= 50) return 'critical';
            if (stock <= reorderPoint) return 'warning';
            return 'ok';
        }

        // Get percentage for stock bar
        function getStockPercentage(filament) {
            const stock = filament.currentStock || 0;
            const maxStock = Math.max(stock, (filament.reorderPoint || 100) * 2);
            return Math.min(100, (stock / maxStock) * 100);
        }

        // Render inventory
        function renderInventory() {
            if (filaments.length === 0) {
                inventoryGrid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                        </svg>
                        <h3>No filaments in inventory</h3>
                        <p>Add filaments or sync from N3D</p>
                    </div>
                `;
                return;
            }

            // Sort by status (critical first)
            const sortedFilaments = [...filaments].sort((a, b) => {
                const statusOrder = { critical: 0, warning: 1, ok: 2 };
                return statusOrder[getStatus(a)] - statusOrder[getStatus(b)];
            });

            inventoryGrid.innerHTML = sortedFilaments.map(filament => {
                const status = getStatus(filament);
                const percentage = getStockPercentage(filament);
                const colorHex = colorMap[filament.color] || '#888888';
                
                return `
                    <div class="filament-card ${status}">
                        <div class="filament-header">
                            <div class="filament-color">
                                <div class="color-swatch" style="background: ${colorHex};"></div>
                                <div>
                                    <div class="filament-name">${filament.color}</div>
                                    <div class="filament-type">${filament.type || 'PLA'}</div>
                                </div>
                            </div>
                            <span class="filament-status ${status}">${status}</span>
                        </div>
                        <div class="filament-stock">
                            <div class="stock-header">
                                <span class="stock-value">${filament.currentStock || 0}g</span>
                                <span class="stock-label">Reorder at ${filament.reorderPoint || 100}g</span>
                            </div>
                            <div class="stock-bar">
                                <div class="stock-fill ${status}" style="width: ${percentage}%"></div>
                            </div>
                        </div>
                        <div class="filament-details">
                            <div class="detail-item">
                                <div class="detail-label">Cost/g</div>
                                <div class="detail-value">$${(filament.costPerGram || 0.013).toFixed(3)}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Value</div>
                                <div class="detail-value">$${((filament.currentStock || 0) * (filament.costPerGram || 0.013)).toFixed(2)}</div>
                            </div>
                        </div>
                        <div class="filament-actions">
                            <button class="btn btn-secondary" onclick="openAdjustModal('${filament.id}')">
                                Adjust
                            </button>
                            <button class="btn btn-secondary" onclick="editFilament('${filament.id}')">
                                Edit
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Update stats
        function updateStats() {
            const total = filaments.length;
            const inStock = filaments.filter(f => getStatus(f) === 'ok').length;
            const low = filaments.filter(f => getStatus(f) === 'warning').length;
            const critical = filaments.filter(f => getStatus(f) === 'critical').length;

            document.getElementById('totalColors').textContent = total;
            document.getElementById('inStock').textContent = inStock;
            document.getElementById('lowStock').textContent = low;
            document.getElementById('criticalStock').textContent = critical;
        }

        // Check low stock and show alerts
        function checkLowStock() {
            const lowStock = filaments.filter(f => getStatus(f) !== 'ok');
            
            if (lowStock.length === 0) {
                alertsContainer.innerHTML = '';
                return;
            }

            const critical = lowStock.filter(f => getStatus(f) === 'critical');
            const isCritical = critical.length > 0;

            alertsContainer.innerHTML = `
                <div class="alert-banner">
                    <div class="alert-icon">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                        </svg>
                    </div>
                    <div class="alert-content">
                        <div class="alert-title">${isCritical ? 'Critical Low Stock!' : 'Low Stock Warning'}</div>
                        <div class="alert-text">
                            ${lowStock.length} filament${lowStock.length > 1 ? 's' : ''} need${lowStock.length === 1 ? 's' : ''} reordering
                        </div>
                    </div>
                </div>
            `;

            // Update reorder list
            const reorderItems = lowStock.map(f => {
                const deficit = (f.reorderPoint || 100) - (f.currentStock || 0);
                const colorHex = colorMap[f.color] || '#888888';
                return `
                    <div class="reorder-item">
                        <div class="reorder-info">
                            <div class="reorder-color" style="background: ${colorHex};"></div>
                            <div>
                                <div class="reorder-name">${f.color}</div>
                                <div class="reorder-deficit">${f.currentStock || 0}g remaining</div>
                            </div>
                        </div>
                        <div class="reorder-qty">+${Math.max(500, deficit + 200)}g</div>
                    </div>
                `;
            }).join('');

            reorderList.innerHTML = reorderItems || `
                <div class="empty-state" style="padding: 2rem;">
                    <p style="color: var(--text-secondary);">All filaments are well stocked!</p>
                </div>
            `;
        }

        // Sync from N3D
        document.getElementById('syncFilamentsBtn').addEventListener('click', async () => {
            const btn = document.getElementById('syncFilamentsBtn');
            btn.innerHTML = '<svg class="animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Syncing...';
            btn.disabled = true;

            // Mock sync - add default filaments if none exist
            if (filaments.length === 0) {
                const defaultFilaments = [
                    { color: 'Red', type: 'PLA', currentStock: 500, reorderPoint: 100, costPerGram: 0.013 },
                    { color: 'Blue', type: 'PLA', currentStock: 450, reorderPoint: 100, costPerGram: 0.013 },
                    { color: 'Green', type: 'PLA', currentStock: 80, reorderPoint: 100, costPerGram: 0.013 },
                    { color: 'Yellow', type: 'PLA', currentStock: 300, reorderPoint: 100, costPerGram: 0.013 },
                    { color: 'Orange', type: 'PLA', currentStock: 200, reorderPoint: 100, costPerGram: 0.013 },
                    { color: 'Purple', type: 'PLA', currentStock: 50, reorderPoint: 100, costPerGram: 0.013 },
                    { color: 'Ivory', type: 'PLA', currentStock: 1000, reorderPoint: 200, costPerGram: 0.018 },
                    { color: 'Black', type: 'PLA', currentStock: 600, reorderPoint: 100, costPerGram: 0.013 },
                    { color: 'White', type: 'PLA', currentStock: 800, reorderPoint: 150, costPerGram: 0.018 },
                    { color: 'Silver', type: 'Silk', currentStock: 150, reorderPoint: 50, costPerGram: 0.0135 },
                    { color: 'Gold', type: 'Silk', currentStock: 30, reorderPoint: 50, costPerGram: 0.0135 }
                ];

                for (const f of defaultFilaments) {
                    const filamentRef = doc(db, 'pokeprint', 'filaments', 'inventory', f.color);
                    await setDoc(filamentRef, {
                        ...f,
                        source: 'n3d',
                        lastSynced: serverTimestamp()
                    });
                }
            }

            btn.innerHTML = `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> Sync N3D`;
            btn.disabled = false;
            alert('Sync completed!');
        });

        // Add Filament Modal
        document.getElementById('addFilamentBtn').addEventListener('click', () => {
            editingFilamentId = null;
            document.getElementById('modalTitle').textContent = 'Add Filament';
            document.getElementById('filamentForm').reset();
            document.getElementById('filamentId').value = '';
            filamentModal.classList.add('open');
        });

        document.getElementById('closeModal').addEventListener('click', () => {
            filamentModal.classList.remove('open');
        });

        document.getElementById('cancelBtn').addEventListener('click', () => {
            filamentModal.classList.remove('open');
        });

        // Form submit
        document.getElementById('filamentForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const color = document.getElementById('filamentColor').value;
            const filamentData = {
                color: color,
                type: document.getElementById('filamentType').value,
                currentStock: parseInt(document.getElementById('filamentStock').value),
                reorderPoint: parseInt(document.getElementById('reorderPoint').value),
                costPerGram: parseFloat(document.getElementById('costPerGram').value),
                updatedAt: serverTimestamp()
            };

            try {
                const id = editingFilamentId || color;
                const filamentRef = doc(db, 'pokeprint', 'filaments', 'inventory', id);
                
                if (!editingFilamentId) {
                    filamentData.source = 'custom';
                    filamentData.createdAt = serverTimestamp();
                }

                await setDoc(filamentRef, filamentData, { merge: true });
                filamentModal.classList.remove('open');
            } catch (error) {
                console.error('Error saving filament:', error);
                alert('Failed to save filament');
            }
        });

        // Edit filament
        window.editFilament = function(filamentId) {
            const filament = filaments.find(f => f.id === filamentId);
            if (!filament) return;

            editingFilamentId = filamentId;
            document.getElementById('modalTitle').textContent = 'Edit Filament';
            document.getElementById('filamentId').value = filamentId;
            document.getElementById('filamentColor').value = filament.color;
            document.getElementById('filamentType').value = filament.type || 'PLA';
            document.getElementById('filamentStock').value = filament.currentStock || 0;
            document.getElementById('reorderPoint').value = filament.reorderPoint || 100;
            document.getElementById('costPerGram').value = filament.costPerGram || 0.013;
            
            filamentModal.classList.add('open');
        };

        // Adjust Stock Modal
        window.openAdjustModal = function(filamentId) {
            adjustingFilamentId = filamentId;
            const filament = filaments.find(f => f.id === filamentId);
            if (!filament) return;

            document.getElementById('adjustFilamentId').value = filamentId;
            document.getElementById('currentStockDisplay').value = `${filament.currentStock || 0}g`;
            document.getElementById('adjustAmount').value = '0';
            adjustModal.classList.add('open');
        };

        document.getElementById('closeAdjustModal').addEventListener('click', () => {
            adjustModal.classList.remove('open');
        });

        document.getElementById('cancelAdjustBtn').addEventListener('click', () => {
            adjustModal.classList.remove('open');
        });

        // Adjust form submit
        document.getElementById('adjustForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const filament = filaments.find(f => f.id === adjustingFilamentId);
            if (!filament) return;

            const adjustment = parseInt(document.getElementById('adjustAmount').value);
            const newStock = Math.max(0, (filament.currentStock || 0) + adjustment);

            try {
                const filamentRef = doc(db, 'pokeprint', 'filaments', 'inventory', adjustingFilamentId);
                await updateDoc(filamentRef, {
                    currentStock: newStock,
                    lastUpdated: serverTimestamp()
                });
                adjustModal.classList.remove('open');
            } catch (error) {
                console.error('Error adjusting stock:', error);
                alert('Failed to update stock');
            }
        });
    </script>
</body>
</html>
