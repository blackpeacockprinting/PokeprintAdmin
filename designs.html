<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Management - PokePrint</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --poke-red: #DC2626;
            --poke-red-dark: #B91C1C;
            --poke-black: #0F0F0F;
            --poke-dark: #1A1A1A;
            --poke-gray: #262626;
            --poke-light: #404040;
            --text-primary: #FFFFFF;
            --text-secondary: #A3A3A3;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--poke-black);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(180deg, var(--poke-dark) 0%, var(--poke-black) 100%);
            border-bottom: 3px solid var(--poke-red);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(180deg, var(--poke-red) 50%, white 50%);
            border-radius: 50%;
            border: 3px solid var(--poke-black);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 3px;
            background: var(--poke-black);
            top: 50%;
            transform: translateY(-50%);
        }

        .logo-icon::after {
            content: '';
            width: 14px;
            height: 14px;
            background: white;
            border: 2px solid var(--poke-black);
            border-radius: 50%;
            position: relative;
            z-index: 1;
        }

        .logo-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .logo-text span {
            color: var(--poke-red);
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
            padding: 0.625rem 1rem;
            background: var(--poke-gray);
            border-radius: 10px;
            border: 1px solid transparent;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--text-primary);
            background: var(--poke-light);
            border-color: var(--poke-red);
        }

        .nav-link svg {
            width: 18px;
            height: 18px;
        }

        /* Main Content */
        .main-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem;
            font-weight: 700;
        }

        .page-actions {
            display: flex;
            gap: 0.75rem;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: var(--poke-red);
            color: white;
        }

        .btn-primary:hover {
            background: var(--poke-red-dark);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--poke-gray);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--poke-light);
        }

        .btn svg {
            width: 18px;
            height: 18px;
        }

        /* API Key Section */
        .api-section {
            background: var(--poke-dark);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--poke-gray);
            margin-bottom: 2rem;
        }

        .api-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .api-title {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .api-title svg {
            width: 20px;
            height: 20px;
            color: var(--poke-red);
        }

        .api-input-group {
            display: flex;
            gap: 0.75rem;
        }

        .api-input {
            flex: 1;
            padding: 0.75rem 1rem;
            background: var(--poke-gray);
            border: 2px solid var(--poke-light);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.875rem;
        }

        .api-input:focus {
            outline: none;
            border-color: var(--poke-red);
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--poke-dark);
            border-radius: 16px;
            padding: 1.25rem;
            border: 1px solid var(--poke-gray);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 0.625rem 1rem;
            background: var(--poke-dark);
            border: 1px solid var(--poke-gray);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-tab:hover {
            border-color: var(--poke-light);
            color: var(--text-primary);
        }

        .filter-tab.active {
            background: var(--poke-red);
            border-color: var(--poke-red);
            color: white;
        }

        /* Designs Grid */
        .designs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }

        .design-card {
            background: var(--poke-dark);
            border-radius: 16px;
            border: 1px solid var(--poke-gray);
            overflow: hidden;
            transition: all 0.2s;
        }

        .design-card:hover {
            border-color: var(--poke-red);
            transform: translateY(-4px);
        }

        .design-image {
            aspect-ratio: 1;
            background: var(--poke-gray);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .design-image img {
            width: 70%;
            height: 70%;
            object-fit: contain;
        }

        .design-source {
            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            padding: 0.25rem 0.5rem;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 6px;
            font-size: 0.625rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .design-source.n3d { color: #3B82F6; }
        .design-source.custom { color: #22C55E; }

        .design-actions-overlay {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            display: flex;
            gap: 0.5rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .design-card:hover .design-actions-overlay {
            opacity: 1;
        }

        .design-info {
            padding: 1rem;
        }

        .design-name {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .design-category {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }

        .design-filaments {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
            margin-bottom: 0.75rem;
        }

        .filament-tag {
            padding: 0.25rem 0.5rem;
            background: var(--poke-gray);
            border-radius: 6px;
            font-size: 0.625rem;
        }

        .design-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--poke-red);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--poke-dark);
            border-radius: 20px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 2px solid var(--poke-gray);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-close svg {
            width: 24px;
            height: 24px;
        }

        /* Form */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .form-input, .form-select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--poke-gray);
            border: 2px solid var(--poke-light);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.9375rem;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--poke-red);
        }

        .filament-inputs {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .filament-row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .filament-row select {
            flex: 1;
        }

        .filament-row input {
            width: 100px;
        }

        .btn-small {
            padding: 0.5rem;
            background: var(--poke-light);
            border: none;
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .btn-small:hover {
            background: var(--poke-red);
            color: white;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .modal-btn {
            flex: 1;
            padding: 0.875rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }

        .modal-btn.primary {
            background: var(--poke-red);
            color: white;
        }

        .modal-btn.secondary {
            background: var(--poke-gray);
            color: var(--text-primary);
        }

        /* Loading */
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--poke-gray);
            border-top-color: var(--poke-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem;
            background: var(--poke-dark);
            border-radius: 16px;
            border: 1px solid var(--poke-gray);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">
                <div class="logo-icon"></div>
                <div class="logo-text">Design<span>Manager</span></div>
            </a>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                    </svg>
                    Shop
                </a>
                <a href="designs.html" class="nav-link active">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    Designs
                </a>
                <a href="inventory.html" class="nav-link">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                    </svg>
                    Inventory
                </a>
                <a href="track-order-v2.html" class="nav-link">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                    </svg>
                    Orders
                </a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <div class="page-header">
            <h1 class="page-title">Design Management</h1>
            <div class="page-actions">
                <button class="btn btn-secondary" id="syncN3DBtn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                    Sync N3D
                </button>
                <button class="btn btn-primary" id="addDesignBtn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                    </svg>
                    Add Custom Design
                </button>
            </div>
        </div>

        <!-- API Key Section -->
        <div class="api-section">
            <div class="api-header">
                <div class="api-title">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                    </svg>
                    N3D API Configuration
                </div>
            </div>
            <div class="api-input-group">
                <input type="password" class="api-input" id="n3dApiKey" placeholder="Enter your N3D API key...">
                <button class="btn btn-secondary" id="saveApiKey">Save Key</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalDesigns">0</div>
                <div class="stat-label">Total Designs</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="n3dDesigns">0</div>
                <div class="stat-label">From N3D</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="customDesigns">0</div>
                <div class="stat-label">Custom Designs</div>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">All Designs</button>
            <button class="filter-tab" data-filter="n3d">N3D Designs</button>
            <button class="filter-tab" data-filter="custom">Custom Designs</button>
        </div>

        <!-- Designs Grid -->
        <div class="designs-grid" id="designsGrid">
            <div class="loading-spinner"></div>
        </div>
    </main>

    <!-- Add/Edit Design Modal -->
    <div class="modal-overlay" id="designModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Add Custom Design</h3>
                <button class="modal-close" id="closeModal">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <form id="designForm">
                <input type="hidden" id="designId">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label class="form-label">Design Name</label>
                        <input type="text" class="form-input" id="designName" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Category</label>
                        <select class="form-select" id="designCategory">
                            <option value="Standard">Standard</option>
                            <option value="Mega">Mega</option>
                            <option value="Special">Special</option>
                            <option value="Legendary">Legendary</option>
                            <option value="Event">Event</option>
                            <option value="Mystery">Mystery</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Base Price ($)</label>
                        <input type="number" class="form-input" id="designPrice" value="8" min="1" step="0.5">
                    </div>
                    <div class="form-group full-width">
                        <label class="form-label">Image URL</label>
                        <input type="url" class="form-input" id="designImage" placeholder="https://...">
                    </div>
                    <div class="form-group full-width">
                        <label class="form-label">Filament Usage (grams per color)</label>
                        <div class="filament-inputs" id="filamentInputs">
                            <div class="filament-row">
                                <select class="form-select filament-color">
                                    <option value="">Select color...</option>
                                </select>
                                <input type="number" class="form-input filament-grams" placeholder="g" min="1">
                                <button type="button" class="btn-small remove-filament">×</button>
                            </div>
                        </div>
                        <button type="button" class="btn btn-secondary" id="addFilamentRow" style="margin-top: 0.5rem; width: 100%;">
                            + Add Filament Color
                        </button>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="modal-btn secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="modal-btn primary">Save Design</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { 
            getFirestore, 
            collection, 
            query, 
            onSnapshot, 
            doc, 
            setDoc,
            updateDoc,
            deleteDoc,
            getDocs,
            serverTimestamp,
            writeBatch
        } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBTp9aLB3VaKIKpztrR029mG3mVEw5MNOQ",
            authDomain: "blackpeacockprinting-fbb65.firebaseapp.com",
            projectId: "blackpeacockprinting-fbb65",
            storageBucket: "blackpeacockprinting-fbb65.firebasestorage.app",
            messagingSenderId: "1025287520257",
            appId: "1:1025287520257:web:ff8d4ab1b69fd859c20000"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // State
        let designs = [];
        let filaments = [];
        let currentFilter = 'all';
        let editingDesignId = null;

        // DOM Elements
        const designsGrid = document.getElementById('designsGrid');
        const designModal = document.getElementById('designModal');
        const designForm = document.getElementById('designForm');
        const n3dApiKeyInput = document.getElementById('n3dApiKey');

        // Load saved API key
        n3dApiKeyInput.value = localStorage.getItem('n3d_api_key') || '';

        // Listen to designs
        const designsQuery = query(collection(db, 'pokeprint', 'designs', 'items'));
        onSnapshot(designsQuery, (snapshot) => {
            designs = [];
            snapshot.forEach((doc) => {
                designs.push({ id: doc.id, ...doc.data() });
            });
            renderDesigns();
            updateStats();
        });

        // Listen to filaments
        const filamentsQuery = query(collection(db, 'pokeprint', 'filaments', 'inventory'));
        onSnapshot(filamentsQuery, (snapshot) => {
            filaments = [];
            snapshot.forEach((doc) => {
                filaments.push({ id: doc.id, ...doc.data() });
            });
            updateFilamentSelects();
        });

        // Update filament selects in modal
        function updateFilamentSelects() {
            const selects = document.querySelectorAll('.filament-color');
            selects.forEach(select => {
                const currentValue = select.value;
                select.innerHTML = '<option value="">Select color...</option>' +
                    filaments.map(f => `<option value="${f.color}">${f.color}</option>`).join('');
                select.value = currentValue;
            });
        }

        // Render designs
        function renderDesigns() {
            let filtered = designs;
            
            if (currentFilter !== 'all') {
                filtered = designs.filter(d => d.source === currentFilter);
            }

            if (filtered.length === 0) {
                designsGrid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                        <h3>No designs found</h3>
                        <p>Add custom designs or sync from N3D</p>
                    </div>
                `;
                return;
            }

            designsGrid.innerHTML = filtered.map(design => `
                <div class="design-card" data-id="${design.id}">
                    <div class="design-image">
                        <img src="${design.image || 'https://via.placeholder.com/200'}" alt="${design.name}">
                        <span class="design-source ${design.source || 'custom'}">${design.source || 'custom'}</span>
                        <div class="design-actions-overlay">
                            <button class="btn-small" onclick="editDesign('${design.id}')" title="Edit">
                                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                                </svg>
                            </button>
                            <button class="btn-small" onclick="deleteDesign('${design.id}')" title="Delete">
                                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="design-info">
                        <div class="design-name">${design.name}</div>
                        <div class="design-category">${design.category || 'Standard'}</div>
                        <div class="design-filaments">
                            ${design.filamentUsage?.map(f => `
                                <span class="filament-tag">${f.grams}g ${f.color}</span>
                            `).join('') || ''}
                        </div>
                        <div class="design-price">$${design.basePrice || 8}</div>
                    </div>
                </div>
            `).join('');
        }

        // Update stats
        function updateStats() {
            document.getElementById('totalDesigns').textContent = designs.length;
            document.getElementById('n3dDesigns').textContent = designs.filter(d => d.source === 'n3d').length;
            document.getElementById('customDesigns').textContent = designs.filter(d => d.source === 'custom').length;
        }

        // Filter tabs
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                renderDesigns();
            });
        });

        // Save API key
        document.getElementById('saveApiKey').addEventListener('click', () => {
            localStorage.setItem('n3d_api_key', n3dApiKeyInput.value);
            alert('API key saved!');
        });

        // Sync N3D
        document.getElementById('syncN3DBtn').addEventListener('click', async () => {
            const apiKey = n3dApiKeyInput.value;
            if (!apiKey) {
                alert('Please enter your N3D API key first');
                return;
            }

            const btn = document.getElementById('syncN3DBtn');
            btn.innerHTML = '<svg class="animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Syncing...';
            btn.disabled = true;

            try {
                // Mock sync - replace with actual N3D API call
                await syncFromN3D(apiKey);
                alert('Sync completed!');
            } catch (error) {
                alert('Sync failed: ' + error.message);
            } finally {
                btn.innerHTML = `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> Sync N3D`;
                btn.disabled = false;
            }
        });

        async function syncFromN3D(apiKey) {
            // This would be the actual N3D API call
            // For now, we'll create some mock N3D designs
            const mockN3DDesigns = [
                {
                    id: 'n3d-pikachu',
                    name: 'Pikachu (N3D)',
                    category: 'Special',
                    basePrice: 12,
                    image: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png',
                    filamentUsage: [
                        { color: 'Yellow', grams: 55 },
                        { color: 'Ivory', grams: 20 },
                        { color: 'Red', grams: 5 },
                        { color: 'Black', grams: 5 }
                    ],
                    source: 'n3d'
                },
                {
                    id: 'n3d-charizard',
                    name: 'Charizard (N3D)',
                    category: 'Mega',
                    basePrice: 12,
                    image: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/6.png',
                    filamentUsage: [
                        { color: 'Orange', grams: 60 },
                        { color: 'Red', grams: 15 },
                        { color: 'Ivory', grams: 10 }
                    ],
                    source: 'n3d'
                }
            ];

            const batch = writeBatch(db);
            
            for (const design of mockN3DDesigns) {
                const designRef = doc(db, 'pokeprint', 'designs', 'items', design.id);
                batch.set(designRef, {
                    ...design,
                    lastSynced: serverTimestamp(),
                    active: true
                }, { merge: true });
            }

            await batch.commit();
        }

        // Add Design Modal
        document.getElementById('addDesignBtn').addEventListener('click', () => {
            editingDesignId = null;
            document.getElementById('modalTitle').textContent = 'Add Custom Design';
            designForm.reset();
            document.getElementById('designId').value = '';
            document.getElementById('filamentInputs').innerHTML = `
                <div class="filament-row">
                    <select class="form-select filament-color">
                        <option value="">Select color...</option>
                    </select>
                    <input type="number" class="form-input filament-grams" placeholder="g" min="1">
                    <button type="button" class="btn-small remove-filament">×</button>
                </div>
            `;
            updateFilamentSelects();
            designModal.classList.add('open');
        });

        document.getElementById('closeModal').addEventListener('click', () => {
            designModal.classList.remove('open');
        });

        document.getElementById('cancelBtn').addEventListener('click', () => {
            designModal.classList.remove('open');
        });

        // Add filament row
        document.getElementById('addFilamentRow').addEventListener('click', () => {
            const row = document.createElement('div');
            row.className = 'filament-row';
            row.innerHTML = `
                <select class="form-select filament-color">
                    <option value="">Select color...</option>
                </select>
                <input type="number" class="form-input filament-grams" placeholder="g" min="1">
                <button type="button" class="btn-small remove-filament">×</button>
            `;
            document.getElementById('filamentInputs').appendChild(row);
            updateFilamentSelects();
        });

        // Remove filament row
        document.getElementById('filamentInputs').addEventListener('click', (e) => {
            if (e.target.classList.contains('remove-filament')) {
                const rows = document.querySelectorAll('.filament-row');
                if (rows.length > 1) {
                    e.target.closest('.filament-row').remove();
                }
            }
        });

        // Form submit
        designForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const filamentUsage = [];
            document.querySelectorAll('.filament-row').forEach(row => {
                const color = row.querySelector('.filament-color').value;
                const grams = parseInt(row.querySelector('.filament-grams').value);
                if (color && grams) {
                    filamentUsage.push({ color, grams });
                }
            });

            const designData = {
                name: document.getElementById('designName').value,
                category: document.getElementById('designCategory').value,
                basePrice: parseFloat(document.getElementById('designPrice').value),
                image: document.getElementById('designImage').value,
                filamentUsage,
                source: 'custom',
                updatedAt: serverTimestamp()
            };

            try {
                const id = editingDesignId || designData.name.toLowerCase().replace(/\s+/g, '-');
                const designRef = doc(db, 'pokeprint', 'designs', 'items', id);
                
                if (!editingDesignId) {
                    designData.createdAt = serverTimestamp();
                    designData.active = true;
                }

                await setDoc(designRef, designData, { merge: true });
                designModal.classList.remove('open');
            } catch (error) {
                console.error('Error saving design:', error);
                alert('Failed to save design');
            }
        });

        // Edit design
        window.editDesign = function(designId) {
            const design = designs.find(d => d.id === designId);
            if (!design) return;

            editingDesignId = designId;
            document.getElementById('modalTitle').textContent = 'Edit Design';
            document.getElementById('designId').value = designId;
            document.getElementById('designName').value = design.name;
            document.getElementById('designCategory').value = design.category || 'Standard';
            document.getElementById('designPrice').value = design.basePrice || 8;
            document.getElementById('designImage').value = design.image || '';

            // Populate filament inputs
            const filamentInputs = document.getElementById('filamentInputs');
            filamentInputs.innerHTML = '';
            
            if (design.filamentUsage?.length > 0) {
                design.filamentUsage.forEach(usage => {
                    const row = document.createElement('div');
                    row.className = 'filament-row';
                    row.innerHTML = `
                        <select class="form-select filament-color">
                            <option value="">Select color...</option>
                        </select>
                        <input type="number" class="form-input filament-grams" placeholder="g" min="1" value="${usage.grams}">
                        <button type="button" class="btn-small remove-filament">×</button>
                    `;
                    filamentInputs.appendChild(row);
                    row.querySelector('.filament-color').value = usage.color;
                });
            } else {
                filamentInputs.innerHTML = `
                    <div class="filament-row">
                        <select class="form-select filament-color">
                            <option value="">Select color...</option>
                        </select>
                        <input type="number" class="form-input filament-grams" placeholder="g" min="1">
                        <button type="button" class="btn-small remove-filament">×</button>
                    </div>
                `;
            }

            updateFilamentSelects();
            designModal.classList.add('open');
        };

        // Delete design
        window.deleteDesign = async function(designId) {
            if (!confirm('Delete this design?')) return;

            try {
                const designRef = doc(db, 'pokeprint', 'designs', 'items', designId);
                await deleteDoc(designRef);
            } catch (error) {
                console.error('Error deleting design:', error);
                alert('Failed to delete design');
            }
        };
    </script>
</body>
</html>
