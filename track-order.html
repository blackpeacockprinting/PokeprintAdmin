<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Tracker - PokePrint</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --poke-red: #DC2626;
            --poke-red-dark: #B91C1C;
            --poke-black: #0F0F0F;
            --poke-dark: #1A1A1A;
            --poke-gray: #262626;
            --poke-light: #404040;
            --text-primary: #FFFFFF;
            --text-secondary: #A3A3A3;
            --status-pending: #F59E0B;
            --status-printing: #3B82F6;
            --status-ready: #8B5CF6;
            --status-complete: #22C55E;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--poke-black);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(180deg, var(--poke-dark) 0%, var(--poke-black) 100%);
            border-bottom: 3px solid var(--poke-red);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(180deg, var(--poke-red) 50%, white 50%);
            border-radius: 50%;
            border: 3px solid var(--poke-black);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 3px;
            background: var(--poke-black);
            top: 50%;
            transform: translateY(-50%);
        }

        .logo-icon::after {
            content: '';
            width: 14px;
            height: 14px;
            background: white;
            border: 2px solid var(--poke-black);
            border-radius: 50%;
            position: relative;
            z-index: 1;
        }

        .logo-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .logo-text span {
            color: var(--poke-red);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .sync-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .sync-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--status-complete);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: color 0.2s;
            padding: 0.5rem 1rem;
            background: var(--poke-gray);
            border-radius: 10px;
        }

        .nav-link:hover {
            color: var(--text-primary);
            background: var(--poke-light);
        }

        .nav-link svg {
            width: 18px;
            height: 18px;
        }

        /* Main Content */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: var(--text-secondary);
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--poke-dark);
            border-radius: 16px;
            padding: 1.25rem;
            border: 1px solid var(--poke-gray);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon.pending { background: rgba(245, 158, 11, 0.2); color: var(--status-pending); }
        .stat-icon.printing { background: rgba(59, 130, 246, 0.2); color: var(--status-printing); }
        .stat-icon.ready { background: rgba(139, 92, 246, 0.2); color: var(--status-ready); }
        .stat-icon.complete { background: rgba(34, 197, 94, 0.2); color: var(--status-complete); }

        .stat-icon svg {
            width: 24px;
            height: 24px;
        }

        .stat-info {
            flex: 1;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 0.625rem 1rem;
            background: var(--poke-dark);
            border: 1px solid var(--poke-gray);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-tab:hover {
            border-color: var(--poke-light);
            color: var(--text-primary);
        }

        .filter-tab.active {
            background: var(--poke-red);
            border-color: var(--poke-red);
            color: white;
        }

        /* Orders Grid */
        .orders-section {
            margin-bottom: 2rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .section-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title svg {
            width: 20px;
            height: 20px;
            color: var(--poke-red);
        }

        .toggle-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--poke-gray);
            border: none;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toggle-btn:hover {
            color: var(--text-primary);
        }

        .toggle-btn svg {
            width: 18px;
            height: 18px;
            transition: transform 0.2s;
        }

        .toggle-btn.collapsed svg {
            transform: rotate(-90deg);
        }

        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1rem;
        }

        @media (max-width: 640px) {
            .orders-grid {
                grid-template-columns: 1fr;
            }
        }

        .orders-grid.collapsed {
            display: none;
        }

        /* Order Card */
        .order-card {
            background: var(--poke-dark);
            border-radius: 16px;
            border: 1px solid var(--poke-gray);
            overflow: hidden;
            transition: all 0.2s;
        }

        .order-card:hover {
            border-color: var(--poke-light);
        }

        .order-header {
            padding: 1rem;
            background: var(--poke-gray);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .order-id {
            font-family: monospace;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .order-date {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .status-badge {
            padding: 0.375rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .status-badge:hover {
            transform: scale(1.05);
        }

        .status-badge.pending { background: rgba(245, 158, 11, 0.2); color: var(--status-pending); }
        .status-badge.printing { background: rgba(59, 130, 246, 0.2); color: var(--status-printing); }
        .status-badge.ready { background: rgba(139, 92, 246, 0.2); color: var(--status-ready); }
        .status-badge.complete { background: rgba(34, 197, 94, 0.2); color: var(--status-complete); }

        .order-body {
            padding: 1rem;
        }

        .customer-info {
            margin-bottom: 1rem;
        }

        .customer-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .customer-contact {
            font-size: 0.875rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .customer-contact svg {
            width: 14px;
            height: 14px;
        }

        .order-items {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .order-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--poke-gray);
            padding: 0.375rem 0.625rem;
            border-radius: 8px;
            font-size: 0.75rem;
        }

        .order-item img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        .order-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 1rem;
            border-top: 1px solid var(--poke-gray);
        }

        .order-total {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--poke-red);
        }

        .order-actions {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            padding: 0.5rem;
            background: var(--poke-gray);
            border: none;
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--poke-red);
            color: white;
        }

        .action-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--poke-dark);
            border-radius: 16px;
            border: 1px solid var(--poke-gray);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: var(--text-secondary);
        }

        /* Status Selector Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--poke-dark);
            border-radius: 20px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            border: 2px solid var(--poke-gray);
        }

        .modal-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .status-options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .status-option {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: var(--poke-gray);
            border: 2px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .status-option:hover {
            border-color: var(--poke-light);
        }

        .status-option.selected {
            border-color: var(--poke-red);
        }

        .status-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        .status-dot.pending { background: var(--status-pending); }
        .status-dot.printing { background: var(--status-printing); }
        .status-dot.ready { background: var(--status-ready); }
        .status-dot.complete { background: var(--status-complete); }

        .status-name {
            flex: 1;
            font-weight: 600;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .modal-btn {
            flex: 1;
            padding: 0.875rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .modal-btn.primary {
            background: var(--poke-red);
            color: white;
        }

        .modal-btn.primary:hover {
            background: var(--poke-red-dark);
        }

        .modal-btn.secondary {
            background: var(--poke-gray);
            color: var(--text-primary);
        }

        .modal-btn.secondary:hover {
            background: var(--poke-light);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">
                <div class="logo-icon"></div>
                <div class="logo-text">Order<span>Tracker</span></div>
            </a>
            <div class="header-actions">
                <div class="sync-status">
                    <div class="sync-indicator"></div>
                    <span>Live Sync</span>
                </div>
                <a href="index.html" class="nav-link">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                    </svg>
                    Shop
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <div class="page-header">
            <h1 class="page-title">Order Management</h1>
            <p class="page-subtitle">Track and manage all PokéPrint orders in real-time</p>
        </div>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-icon pending">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-value" id="pendingCount">0</div>
                    <div class="stat-label">Pending</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon printing">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path>
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-value" id="printingCount">0</div>
                    <div class="stat-label">Printing</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon ready">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-value" id="readyCount">0</div>
                    <div class="stat-label">Ready</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon complete">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-value" id="completeCount">0</div>
                    <div class="stat-label">Complete</div>
                </div>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">All Orders</button>
            <button class="filter-tab" data-filter="Pending">Pending</button>
            <button class="filter-tab" data-filter="Printing">Printing</button>
            <button class="filter-tab" data-filter="Ready">Ready</button>
            <button class="filter-tab" data-filter="Complete">Complete</button>
        </div>

        <!-- Active Orders -->
        <div class="orders-section">
            <div class="section-header">
                <h2 class="section-title">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                    </svg>
                    Active Orders
                </h2>
            </div>
            <div class="orders-grid" id="activeOrders">
                <!-- Active orders will be loaded here -->
            </div>
        </div>

        <!-- Completed Orders -->
        <div class="orders-section">
            <div class="section-header">
                <h2 class="section-title">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    Completed Orders
                </h2>
                <button class="toggle-btn" id="toggleCompleted">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                    </svg>
                    Hide
                </button>
            </div>
            <div class="orders-grid" id="completedOrders">
                <!-- Completed orders will be loaded here -->
            </div>
        </div>
    </main>

    <!-- Status Selector Modal -->
    <div class="modal-overlay" id="statusModal">
        <div class="modal">
            <h3 class="modal-title">Update Order Status</h3>
            <div class="status-options">
                <div class="status-option" data-status="Pending">
                    <div class="status-dot pending"></div>
                    <span class="status-name">Pending</span>
                </div>
                <div class="status-option" data-status="Printing">
                    <div class="status-dot printing"></div>
                    <span class="status-name">Printing</span>
                </div>
                <div class="status-option" data-status="Ready">
                    <div class="status-dot ready"></div>
                    <span class="status-name">Ready for Pickup</span>
                </div>
                <div class="status-option" data-status="Complete">
                    <div class="status-dot complete"></div>
                    <span class="status-name">Complete</span>
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn secondary" id="cancelStatus">Cancel</button>
                <button class="modal-btn primary" id="confirmStatus">Update Status</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBTp9aLB3VaKIKpztrR029mG3mVEw5MNOQ",
            authDomain: "blackpeacockprinting-fbb65.firebaseapp.com",
            projectId: "blackpeacockprinting-fbb65",
            storageBucket: "blackpeacockprinting-fbb65.firebasestorage.app",
            messagingSenderId: "1025287520257",
            appId: "1:1025287520257:web:ff8d4ab1b69fd859c20000"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // State
        let orders = [];
        let currentFilter = 'all';
        let selectedOrderId = null;
        let selectedStatus = null;

        // DOM Elements
        const activeOrdersGrid = document.getElementById('activeOrders');
        const completedOrdersGrid = document.getElementById('completedOrders');
        const pendingCount = document.getElementById('pendingCount');
        const printingCount = document.getElementById('printingCount');
        const readyCount = document.getElementById('readyCount');
        const completeCount = document.getElementById('completeCount');
        const statusModal = document.getElementById('statusModal');
        const toggleCompleted = document.getElementById('toggleCompleted');

        // Listen to orders in real-time
        const ordersQuery = query(
            collection(db, 'pokeprint', 'orders', 'orders'),
            orderBy('createdAt', 'desc')
        );

        onSnapshot(ordersQuery, (snapshot) => {
            orders = [];
            snapshot.forEach((doc) => {
                orders.push({ id: doc.id, ...doc.data() });
            });
            renderOrders();
            updateStats();
        });

        // Render orders
        function renderOrders() {
            let filteredOrders = orders;
            
            if (currentFilter !== 'all') {
                filteredOrders = orders.filter(o => o.status === currentFilter);
            }

            const activeOrders = filteredOrders.filter(o => o.status !== 'Complete');
            const completedOrders = filteredOrders.filter(o => o.status === 'Complete');

            // Render active orders
            if (activeOrders.length === 0) {
                activeOrdersGrid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                        </svg>
                        <h3>No active orders</h3>
                        <p>New orders will appear here automatically</p>
                    </div>
                `;
            } else {
                activeOrdersGrid.innerHTML = activeOrders.map(order => renderOrderCard(order)).join('');
            }

            // Render completed orders
            if (completedOrders.length === 0) {
                completedOrdersGrid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <h3>No completed orders yet</h3>
                        <p>Completed orders will appear here</p>
                    </div>
                `;
            } else {
                completedOrdersGrid.innerHTML = completedOrders.map(order => renderOrderCard(order)).join('');
            }
        }

        // Render order card
        function renderOrderCard(order) {
            const date = order.createdAt?.toDate ? order.createdAt.toDate().toLocaleString() : 'Just now';
            const itemCount = order.items?.reduce((sum, item) => sum + item.quantity, 0) || 0;
            
            return `
                <div class="order-card" data-id="${order.id}">
                    <div class="order-header">
                        <div>
                            <div class="order-id">#POKE-${order.id.slice(-6).toUpperCase()}</div>
                            <div class="order-date">${date}</div>
                        </div>
                        <span class="status-badge ${order.status.toLowerCase()}" data-id="${order.id}" data-status="${order.status}">
                            ${order.status}
                        </span>
                    </div>
                    <div class="order-body">
                        <div class="customer-info">
                            <div class="customer-name">${order.customer?.firstName} ${order.customer?.lastName}</div>
                            <div class="customer-contact">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                                </svg>
                                ${order.customer?.email}
                            </div>
                            <div class="customer-contact">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                                </svg>
                                ${order.customer?.phone} (${order.customer?.contactMethod})
                            </div>
                        </div>
                        <div class="order-items">
                            ${order.items?.slice(0, 4).map(item => `
                                <div class="order-item">
                                    <img src="${item.image}" alt="${item.name}">
                                    <span>${item.name} x${item.quantity}</span>
                                </div>
                            `).join('') || ''}
                            ${itemCount > 4 ? `<div class="order-item">+${itemCount - 4} more</div>` : ''}
                        </div>
                        <div class="order-footer">
                            <div class="order-total">$${order.pricing?.total?.toFixed(2) || '0.00'}</div>
                            <div class="order-actions">
                                <button class="action-btn" onclick="copyOrderInfo('${order.id}')" title="Copy order info">
                                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                                    </svg>
                                </button>
                                <button class="action-btn" onclick="deleteOrder('${order.id}')" title="Delete order">
                                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Update stats
        function updateStats() {
            const counts = {
                Pending: orders.filter(o => o.status === 'Pending').length,
                Printing: orders.filter(o => o.status === 'Printing').length,
                Ready: orders.filter(o => o.status === 'Ready').length,
                Complete: orders.filter(o => o.status === 'Complete').length
            };

            pendingCount.textContent = counts.Pending;
            printingCount.textContent = counts.Printing;
            readyCount.textContent = counts.Ready;
            completeCount.textContent = counts.Complete;
        }

        // Filter tabs
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                renderOrders();
            });
        });

        // Toggle completed orders
        let completedCollapsed = false;
        toggleCompleted.addEventListener('click', () => {
            completedCollapsed = !completedCollapsed;
            completedOrdersGrid.classList.toggle('collapsed', completedCollapsed);
            toggleCompleted.classList.toggle('collapsed', completedCollapsed);
            toggleCompleted.innerHTML = completedCollapsed ? `
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
                Show
            ` : `
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
                Hide
            `;
        });

        // Status badge click
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('status-badge')) {
                selectedOrderId = e.target.dataset.id;
                selectedStatus = e.target.dataset.status;
                openStatusModal();
            }
        });

        // Status modal
        function openStatusModal() {
            document.querySelectorAll('.status-option').forEach(opt => {
                opt.classList.toggle('selected', opt.dataset.status === selectedStatus);
            });
            statusModal.classList.add('open');
        }

        document.getElementById('cancelStatus').addEventListener('click', () => {
            statusModal.classList.remove('open');
            selectedOrderId = null;
            selectedStatus = null;
        });

        document.querySelectorAll('.status-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.status-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selectedStatus = opt.dataset.status;
            });
        });

        document.getElementById('confirmStatus').addEventListener('click', async () => {
            if (!selectedOrderId || !selectedStatus) return;

            try {
                const orderRef = doc(db, 'pokeprint', 'orders', 'orders', selectedOrderId);
                await updateDoc(orderRef, {
                    status: selectedStatus,
                    updatedAt: serverTimestamp()
                });
                statusModal.classList.remove('open');
                selectedOrderId = null;
                selectedStatus = null;
            } catch (error) {
                console.error('Error updating status:', error);
                alert('Failed to update status. Please try again.');
            }
        });

        // Copy order info
        window.copyOrderInfo = function(orderId) {
            const order = orders.find(o => o.id === orderId);
            if (!order) return;

            const text = `Order #POKE-${order.id.slice(-6).toUpperCase()}
Customer: ${order.customer?.firstName} ${order.customer?.lastName}
Email: ${order.customer?.email}
Phone: ${order.customer?.phone}
Items: ${order.items?.map(i => `${i.name} x${i.quantity}`).join(', ')}
Total: $${order.pricing?.total?.toFixed(2)}`;

            navigator.clipboard.writeText(text).then(() => {
                alert('Order info copied to clipboard!');
            });
        };

        // Delete order
        window.deleteOrder = async function(orderId) {
            if (!confirm('Are you sure you want to delete this order?')) return;

            try {
                const orderRef = doc(db, 'pokeprint', 'orders', 'orders', orderId);
                await updateDoc(orderRef, {
                    deleted: true,
                    updatedAt: serverTimestamp()
                });
            } catch (error) {
                console.error('Error deleting order:', error);
                alert('Failed to delete order. Please try again.');
            }
        };
    </script>
</body>
</html>
